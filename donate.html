<!doctype html>
<html lang="hi">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="assets/css/style.css">
  <style>
  /* SAME FONT SCALE AS OTHER PAGES */
  .hero h1{
    font-size: clamp(1.55rem, 2.5vw, 2.15rem) !important;
    line-height: 1.16;
    max-width: 680px;
    margin-bottom: 14px;
  }

  .hero p{
    max-width: 640px;
    font-size: .95rem;
    line-height: 1.68;
  }

  .hero{
    overflow: hidden;
  }

  .hero .wrap{
    position: relative;
    z-index: 2;
  }

  .impact-band{
    font-size: .95rem;
    line-height: 1.65;
  }

  .section-title{
    font-size: clamp(1.6rem, 2.4vw, 2.1rem) !important;
    letter-spacing: -.02em;
  }

  .section-sub{
    font-size: .95rem !important;
    line-height: 1.65 !important;
  }

  .check-list li,
  .value-list li{
    font-size: .95rem;
    line-height: 1.6;
  }

  .donate-hero-panel{
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .qr-hero-box{
    width:100%;
    max-width:420px;
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:28px;
    box-shadow:0 18px 48px rgba(2,6,23,.08);
    padding:24px;
    text-align:center;
  }

  .qr-hero-box h3{
    margin:0 0 16px;
    font-size:1.35rem;
    line-height:1.22;
    color:#0b1220;
  }

  .hero-qr-img{
    width:100%;
    max-width:280px;
    border-radius:18px;
    display:block;
    margin:0 auto 16px;
    box-shadow:0 12px 28px rgba(2,6,23,.10);
    transition:transform .2s ease;
  }

  .hero-qr-img:hover{
    transform:scale(1.02);
  }

  .hero-qr-text{
    margin:0 auto 14px;
    max-width:300px;
    font-size:.95rem;
    line-height:1.6;
    color:#475569;
  }

  .hero-qr-btns{
    justify-content:center;
    gap:12px;
    margin-top:10px;
  }

  .hero-qr-btns .btn{
    min-width:170px;
  }

  .mini-bank-line{
    margin-top:16px;
    padding-top:14px;
    border-top:1px solid #e2e8f0;
    font-size:.92rem;
    line-height:1.55;
    color:#334155;
    word-break:break-all;
  }

  .bank-copy-row{
    margin-top:18px;
    display:flex;
    justify-content:flex-start;
    gap:12px;
    flex-wrap:wrap;
  }

  .bank-copy-row .btn{
    min-width:220px;
  }

  .notice{
    font-size:.95rem;
    line-height:1.6;
  }

  @media (max-width:768px){
    .hero h1{
      font-size: clamp(1.45rem, 7vw, 1.95rem) !important;
    }

    .hero p,
    .impact-band,
    .section-sub,
    .check-list li,
    .value-list li,
    .hero-qr-text,
    .notice{
      font-size:.92rem !important;
    }

    .qr-hero-box{
      max-width:100%;
      border-radius:22px;
      padding:20px;
    }

    .hero-qr-img{
      max-width:240px;
    }

    .hero-qr-btns .btn{
      min-width:unset;
      width:100%;
    }

    .bank-copy-row{
      justify-content:center;
    }

    .bank-copy-row .btn{
      width:100%;
      min-width:unset;
    }
  }
</style>
</head>

Donate Now
