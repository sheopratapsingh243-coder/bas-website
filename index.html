<head>

  <link rel="stylesheet" href="assets/css/style.css">

  <style>
  .hero h1{
    font-size: clamp(1.9rem, 3.3vw, 2.85rem) !important;
    line-height: 1.16;
    max-width: 820px;
  }

  .hero p{
    max-width: 760px;
  }

  .hero .btn-row{
    gap: 14px;
    flex-wrap: wrap;
  }

  .hero .btn-primary{
    box-shadow: 0 14px 30px rgba(11, 90, 166, .22);
  }

  .hero .btn-primary:hover{
    transform: translateY(-1px);
  }

  .impact-band{
    font-size: 1rem;
    line-height: 1.7;
  }

  .section-title{
    letter-spacing: -.02em;
  }

  .initiatives-slider.fullwidth-cinematic{
    position: relative;
    margin-top: 30px;
    width: 100vw;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
    padding: 0 0 8px;
  }

  .initiative-slide{
    display: none;
    animation: fadeSlide .5s ease;
  }

  .initiative-slide.active{
    display: block;
  }

  @keyframes fadeSlide{
    from{opacity:.35; transform:translateY(10px)}
    to{opacity:1; transform:translateY(0)}
  }

  .initiative-shell{
    position: relative;
    min-height: 560px;
    border-radius: 0;
    overflow: hidden;
    background: #0f172a;
    box-shadow: 0 24px 60px rgba(15, 23, 42, .16);
  }

  .initiative-shell img{
    width: 100%;
    height: 560px;
    object-fit: contain;
    background:
      linear-gradient(180deg, rgba(15,23,42,.08), rgba(15,23,42,.18)),
      #f8fafc;
    display: block;
  }

  .initiative-overlay{
    position: absolute;
    inset: 0;
    display: flex;
    align-items: end;
    padding: 48px min(7vw, 80px) 54px;
    background: linear-gradient(to right, rgba(2,6,23,.82) 0%, rgba(2,6,23,.54) 36%, rgba(2,6,23,.18) 62%, rgba(2,6,23,.06) 100%);
    color: #fff;
  }

  .initiative-copy{
    max-width: 720px;
  }

  .initiative-overlay .program-tag{
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 7px 12px;
    margin-bottom: 14px;
    border-radius: 999px;
    background: rgba(255,255,255,.14);
    color: #fff;
    border: 1px solid rgba(255,255,255,.16);
    backdrop-filter: blur(6px);
  }

  .initiative-overlay h3{
    margin: 0 0 14px;
    font-size: clamp(1.8rem, 3vw, 2.6rem);
    line-height: 1.14;
    color: #fff;
    max-width: 680px;
  }

  .initiative-overlay p{
    margin: 0;
    max-width: 680px;
    font-size: 1.03rem;
    line-height: 1.78;
    color: rgba(255,255,255,.94);
  }

  .initiative-metrics{
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 220px));
    gap: 14px;
    margin-top: 22px;
  }

  .initiative-metrics div{
    background: rgba(255,255,255,.12);
    backdrop-filter: blur(7px);
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 18px;
    padding: 13px 15px;
  }

  .initiative-metrics strong{
    display: block;
    font-size: 1rem;
    margin-bottom: 4px;
    color: #fff;
  }

  .initiative-metrics span{
    font-size: .93rem;
    line-height: 1.45;
    color: rgba(255,255,255,.92);
  }

  .slider-arrow{
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 3;
    width: 54px;
    height: 54px;
    border: 0;
    border-radius: 50%;
    cursor: pointer;
    font-size: 26px;
    background: rgba(255,255,255,.92);
    color: #0f172a;
    box-shadow: 0 12px 30px rgba(15,23,42,.18);
  }

  .slider-arrow.prev{ left: 24px; }
  .slider-arrow.next{ right: 24px; }

  .slider-dots{
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 18px auto 0;
    max-width: 1200px;
    padding: 0 20px;
  }

  .slider-dot{
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: #cbd5e1;
    cursor: pointer;
    transition: .25s ease;
  }

  .slider-dot.active{
    width: 30px;
    background: #0b5aa6;
  }

  .slider-cta{
    display: flex;
    gap: 14px;
    justify-content: center;
    margin: 24px auto 0;
    flex-wrap: wrap;
    max-width: 1200px;
    padding: 0 20px;
  }

  .slider-cta .btn{
    min-width: 190px;
  }

  .slider-cta .btn-primary{
    position: relative;
    box-shadow: 0 18px 34px rgba(11,90,166,.24);
  }

  .slider-cta .btn-primary::after{
    content: "→";
    margin-left: 8px;
  }

  .slider-note{
    text-align: center;
    margin: 14px auto 0;
    max-width: 760px;
    padding: 0 20px;
    font-size: .98rem;
    line-height: 1.7;
    color: #475569;
  }

  .cta-strip{
    border-radius: 26px;
    box-shadow: 0 20px 50px rgba(15,23,42,.08);
  }

  @media (max-width: 900px){
    .initiative-shell{
      min-height: 430px;
    }

    .initiative-shell img{
      height: 430px;
    }

    .initiative-overlay{
      padding: 28px 18px 26px;
      background: linear-gradient(to top, rgba(2,6,23,.84), rgba(2,6,23,.40), rgba(2,6,23,.14));
    }

    .initiative-copy{
      max-width: 100%;
    }

    .initiative-metrics{
      grid-template-columns: 1fr;
      max-width: 100%;
    }

    .slider-arrow{
      width: 44px;
      height: 44px;
      font-size: 22px;
    }

    .slider-arrow.prev{ left: 12px; }
    .slider-arrow.next{ right: 12px; }
  }
</style>
</head>
<body>
  <div id="header"></div>

  <section class="hero">
    <div class="wrap hero-grid">
      <div>

        <h1 data-hi="सेवा से सम्मान, सहयोग से परिवर्तन, और विश्वास से आत्मनिर्भर भारत।" data-en="Dignity through service, change through support, and a self-reliant India through trust."></h1>
        <p data-hi="भारत अभ्युदय संस्थान शिक्षा, स्वास्थ्य सेवा, महिला सशक्तिकरण, वृद्धजन सहायता, आपातकालीन सहयोग, गौसेवा और धरोहर संरक्षण के माध्यम से समाज के वास्तविक जरूरतमंद वर्ग तक प्रभावशाली, उत्तरदायी और सम्मानजनक सहायता पहुँचाने के लिए कार्यरत है।" data-en="Bharat Abhyudaya Sansthan works to deliver impactful, accountable and dignified support to genuinely underserved communities through education, healthcare, women empowerment, elder care, emergency assistance, cow care and heritage conservation."></p>
        <div class="btn-row">

        <div class="stat"><strong data-count="169000" data-suffix="+">0</strong><span data-hi="समुदाय सहभागिता व पहुँच" data-en="Community reach & engagement"></span></div>
        <div class="stat"><strong data-count="7" data-suffix="+">0</strong><span data-hi="सक्रिय जनसेवी अभियान" data-en="Active public service initiatives"></span></div>
        <div class="stat"><strong data-count="100" data-suffix="%">0</strong><span data-hi="पारदर्शिता और दस्तावेज़ उपलब्धता" data-en="Transparency and document availability"></span></div>

  <section class="section tight">
    <div class="wrap">
      <div class="grid-3 mission-grid">
        <div class="card">
          <h2 data-hi="हमारा दृष्टिकोण" data-en="Our approach"></h2>
          <p class="section-sub" style="font-size:16px" data-hi="हम सहायता को एक सम्मानजनक प्रक्रिया मानते हैं। इसलिए ज़मीन पर काम, वास्तविक ज़रूरत की पहचान, समुदाय से संवाद और जवाबदेही हमारी कार्यशैली के मूल तत्व हैं।" data-en="We treat assistance as a dignified process. Ground-level work, identification of genuine need, community dialogue and accountability are central to our operating model."></p>

        <div class="card">
          <h2 data-hi="हमारा वचन" data-en="Our promise"></h2>
          <p class="section-sub" style="font-size:16px" data-hi="जो भी सहयोग मिले, उसका उपयोग उद्देश्यपूर्ण, पारदर्शी और प्रभावमुखी रूप से किया जाए — यही संस्था की बुनियादी प्रतिबद्धता है।" data-en="Every contribution should be used with purpose, transparency and an outcomes-oriented mindset — that is our foundational commitment."></p>

        <div class="card">

        </div>
      </div>
    </div>
  </section>

  <section class="section tight">

      <div class="grid-2">

  <script>
    (function(){
      let currentSlide = 0;
      let sliderTimer;

      function initInitiativesSlider(){
        const slides = document.querySelectorAll('.initiative-slide');
        const dots = document.querySelectorAll('.slider-dot');
        const prevBtn = document.getElementById('initiativePrev');
        const nextBtn = document.getElementById('initiativeNext');

        if(!slides.length) return;

        function showSlide(index){
          slides.forEach((slide, i)=>{
            slide.classList.toggle('active', i === index);
          });
          dots.forEach((dot, i)=>{
            dot.classList.toggle('active', i === index);
          });
          currentSlide = index;
        }

        function nextSlide(){
          const next = (currentSlide + 1) % slides.length;
          showSlide(next);
        }

        function prevSlide(){
          const prev = (currentSlide - 1 + slides.length) % slides.length;
          showSlide(prev);
        }

        function startAuto(){
          stopAuto();
          sliderTimer = setInterval(nextSlide, 5000);
        }

        function stopAuto(){
          if(sliderTimer) clearInterval(sliderTimer);
        }

        if(nextBtn){
          nextBtn.addEventListener('click', ()=>{
            nextSlide();
            startAuto();
          });
        }

        if(prevBtn){
          prevBtn.addEventListener('click', ()=>{
            prevSlide();
            startAuto();
          });
        }

        dots.forEach((dot, i)=>{
          dot.addEventListener('click', ()=>{
            showSlide(i);
            startAuto();
          });
        });

        showSlide(0);
        startAuto();
      }

      document.addEventListener('DOMContentLoaded', initInitiativesSlider);
    })();
  </script>
