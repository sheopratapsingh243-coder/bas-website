<!doctype html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Initiatives | Bharat Abhyudaya Sansthan</title>
  <meta name="description" content="Explore the key initiatives of Bharat Abhyudaya Sansthan across education, healthcare, women empowerment, cow care, heritage conservation and emergency support.">
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
  /* SAME FONT SCALE AS INDEX / ABOUT */
  .hero h1{
    font-size: clamp(1.55rem, 2.5vw, 2.15rem) !important;
    line-height: 1.16;
    max-width: 680px;
    margin-bottom: 14px;
  }

  .hero p{
    max-width: 640px;
    font-size: .95rem;
    line-height: 1.68;
  }

  .hero .wrap{
    position: relative;
    z-index: 2;
  }

  .hero{
    overflow: hidden;
  }

  .section-title{
    font-size: clamp(1.6rem, 2.4vw, 2.1rem) !important;
    letter-spacing: -.02em;
  }

  .section-sub{
    font-size: .95rem !important;
    line-height: 1.65 !important;
  }

  .program-card .body p{
    font-size: .95rem;
    line-height: 1.65;
  }

  .program-card h3{
    line-height: 1.25;
  }

  .program-tag{
    font-size: .82rem;
  }

  .program-metrics strong{
    font-size: .92rem;
  }

  .program-metrics span{
    font-size: .9rem;
    line-height: 1.5;
  }

  .steps li,
  .check-list li{
    font-size: .95rem;
    line-height: 1.6;
  }

  .btn-row{
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 18px;
    align-items: center;
  }

  .btn-row .btn,
  .detail-actions .btn{
    min-width: 150px;
    text-align: center;
  }

  /* DETAIL SECTIONS */
  .initiative-detail{
    padding-top: 8px;
  }

  .detail-divider{
    border-top: 1px solid #e2e8f0;
    margin: 8px 0 24px;
  }

  .initiative-feature{
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .initiative-feature-grid{
    display: grid;
    grid-template-columns: 1fr;
  }

  .initiative-section-heading{
    margin: 0 0 16px;
    font-size: clamp(1.4rem, 2.2vw, 2rem);
    line-height: 1.2;
    letter-spacing: -.02em;
    color: var(--fg);
  }

  .initiative-feature-media{
    background: #f8fafc;
    line-height: 0;
    padding: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .initiative-feature-media img{
    width: 100%;
    height: auto;
    max-height: 520px;
    display: block;
    object-fit: contain;
    object-position: center;
    border-radius: 16px;
  }

  .initiative-feature-body{
    padding: 28px;
  }

  .initiative-kicker{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(11,90,166,.08);
    color: var(--brand);
    border: 1px solid rgba(11,90,166,.12);
    padding: 7px 12px;
    border-radius: 999px;
    font-size: .82rem;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .initiative-feature-body h2{
    margin: 0 0 12px;
    font-size: clamp(1.45rem, 2.4vw, 2rem);
    line-height: 1.18;
    letter-spacing: -.02em;
  }

  .initiative-lead{
    margin: 0 0 18px;
    font-size: .98rem;
    line-height: 1.72;
    color: var(--muted);
  }

  .initiative-blocks{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 18px;
  }

  .initiative-box{
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }

  .initiative-box h3{
    margin: 0 0 10px;
    font-size: 1rem;
    line-height: 1.3;
  }

  .initiative-box p{
    margin: 0;
    font-size: .94rem;
    line-height: 1.68;
    color: var(--muted);
  }

  .initiative-box ul,
  .initiative-box ol{
    margin: 0;
    padding-left: 18px;
  }

  .initiative-box li{
    margin: 0 0 8px;
    font-size: .94rem;
    line-height: 1.62;
    color: var(--muted);
  }

  .support-grid{
    display: grid;
    grid-template-columns: repeat(2, minmax(0,1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .support-item{
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 15px;
  }

  .support-item strong{
    display: block;
    margin-bottom: 4px;
    font-size: .95rem;
  }

  .support-item span{
    font-size: .92rem;
    line-height: 1.55;
    color: var(--muted);
  }

  .cost-list{
    margin-top: 10px;
  }

  .cost-list li strong{
    color: var(--fg);
  }

  .timeline-list li,
  .trust-list li{
    margin-bottom: 8px;
  }

  .initiative-note{
    margin-top: 14px;
    font-size: .92rem;
    line-height: 1.65;
    color: var(--muted);
  }

  .detail-actions{
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 0 0 18px;
    align-items: center;
  }

  .detail-toggle-content{
    display: none;
    animation: fadeBlock .28s ease;
  }

  .detail-toggle-content.open{
    display: block;
  }

  .toggle-readmore{
    cursor: pointer;
  }

  @keyframes fadeBlock{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }

  @media (max-width: 900px){
    .hero h1{
      font-size: clamp(1.45rem, 7vw, 1.95rem) !important;
    }

    .hero p{
      font-size: .92rem;
    }

    .program-card .body p,
    .steps li,
    .check-list li{
      font-size: .92rem;
    }

    .initiative-feature-media img{
      height: clamp(190px, 52vw, 280px);
    }

    .initiative-feature-body{
      padding: 20px;
    }

    .initiative-blocks{
      grid-template-columns: 1fr;
    }

    .support-grid{
      grid-template-columns: 1fr;
    }

    .btn-row .btn,
    .detail-actions .btn{
      min-width: 140px;
    }
  }
  </style>
</head>
<body>
  <div id="header"></div>
  <div class="topbar-space"></div>

  <section class="hero">
    <div class="wrap">
      <span class="kicker" data-hi="हमारे प्रयास" data-en="Our Initiatives"></span>
      <h1 data-hi="ऐसी पहलें जो ज़मीन पर उपयोगी, मानवीय और विश्वसनीय असर छोड़ें।" data-en="Initiatives designed to create useful, humane and credible change on the ground."></h1>
      <p data-hi="हमारी प्रत्येक पहल का उद्देश्य केवल एक सेवा गतिविधि चलाना नहीं, बल्कि किसी वास्तविक सामाजिक आवश्यकता को व्यवस्थित, सम्मानजनक और भरोसेमंद सहयोग से संबोधित करना है।" data-en="Each initiative is designed not merely as an activity, but as a structured, dignified and trustworthy response to a real social need."></p>
    </div>
  </section>

  <!-- PROGRAM GRID JUST BELOW HERO -->
  <section class="section tight">
    <div class="wrap program-grid">

      <!-- 1. SHIKSHA -->
      <article class="program-card">
        <img src="assets/initiatives/shiksha-sarathi.png" alt="Shiksha Sarathi">
        <div class="body">
          <span class="program-tag" data-hi="शिक्षा" data-en="Education"></span>
          <h3 data-hi="शिक्षा सारथी अभियान" data-en="Shiksha Sarathi Campaign"></h3>
          <p data-hi="हमारा प्रमुख शिक्षा कार्यक्रम, जिसका उद्देश्य आर्थिक रूप से कमजोर बच्चों को अध्ययन सामग्री, स्कूल आवश्यकताएँ और शैक्षिक सहयोग देकर ड्रॉपआउट रोकना है।" data-en="Our flagship education programme focused on preventing dropouts by providing study kits, school essentials and academic support to underprivileged children."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="5000+" data-en="5000+"></strong>
              <span data-hi="FY 2026–27 में लक्षित बच्चे" data-en="Target children in FY 2026–27"></span>
            </div>
            <div>
              <strong data-hi="₹2500–₹3000" data-en="₹2500–₹3000"></strong>
              <span data-hi="प्रति बच्चे अनुमानित सहयोग लागत" data-en="Approximate support cost per child"></span>
            </div>
          </div>
          <div class="btn-row">
            <a class="btn btn-primary" href="https://rzp.io/rzp/PfLSQ0HB" target="_blank" rel="noopener" data-hi="अभी दान करें" data-en="Donate Now"></a>
            <button type="button" class="btn btn-outline toggle-readmore" data-target="shikshaDetailSection"></button>
          </div>
        </div>
      </article>

      <!-- 2. HERITAGE -->
      <article class="program-card">
        <img src="assets/initiatives/heritage.png" alt="Heritage Conservation">
        <div class="body">
          <span class="program-tag" data-hi="धरोहर संरक्षण" data-en="Heritage Conservation"></span>
          <h3 data-hi="धरोहर संरक्षण कार्यक्रम" data-en="Heritage Conservation Programme"></h3>
          <p data-hi="स्थानीय इतिहास, संस्कृति और सामुदायिक स्मृति को संरक्षित करने तथा नई पीढ़ी को उससे जोड़ने की पहल।" data-en="A programme to preserve local history, culture and collective memory while connecting younger generations to heritage."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="Culture" data-en="Culture"></strong>
              <span data-hi="पहचान और विरासत की रक्षा" data-en="Protecting identity and heritage"></span>
            </div>
            <div>
              <strong data-hi="Awareness" data-en="Awareness"></strong>
              <span data-hi="जन-जागरूकता और सम्मान" data-en="Public awareness and respect"></span>
            </div>
          </div>
          <div class="btn-row">
            <a class="btn btn-primary" href="https://razorpay.me/@basindia" target="_blank" rel="noopener" data-hi="अभी दान करें" data-en="Donate Now"></a>
            <button type="button" class="btn btn-outline toggle-readmore" data-target="heritageDetailSection"></button>
          </div>
        </div>
      </article>

      <!-- 3. AMBULANCE -->
      <article class="program-card">
        <img src="assets/initiatives/ambulance.png" alt="Jeevan Rakshak Ambulance Seva">
        <div class="body">
          <span class="program-tag" data-hi="आपात जीवनरक्षा" data-en="Emergency Lifeline"></span>
          <h3 data-hi="जीवन रक्षक एम्बुलेंस सेवा" data-en="Jeevan Rakshak Ambulance Seva"></h3>
          <p data-hi="ऐसी आपातकालीन सहायता जो मरीज को समय पर अस्पताल पहुँचाकर परिवार के लिए आशा, राहत और जीवन की संभावना बनाए रखे।" data-en="An emergency support initiative that helps patients reach hospitals on time, turning urgency into hope, relief and a real chance to survive."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="₹2500" data-en="₹2500"></strong>
              <span data-hi="प्रति मरीज औसत सहायता लागत" data-en="Average support cost per patient"></span>
            </div>
            <div>
              <strong data-hi="Rapid" data-en="Rapid"></strong>
              <span data-hi="समय पर अस्पताल पहुँचाना" data-en="Timely hospital access"></span>
            </div>
          </div>
          <div class="btn-row">
            <a class="btn btn-primary" href="https://rzp.io/rzp/vXbJ1wf" target="_blank" rel="noopener" data-hi="अभी दान करें" data-en="Donate Now"></a>
            <button type="button" class="btn btn-outline toggle-readmore" data-target="ambulanceDetailSection"></button>
          </div>
        </div>
      </article>

      <!-- 4. GAUSEVA -->
      <article class="program-card">
        <img src="assets/initiatives/gauseva.png" alt="Gau Sanrakshan & Seva Abhiyan">
        <div class="body">
          <span class="program-tag" data-hi="गौसेवा" data-en="Cow Care"></span>
          <h3 data-hi="गौसंरक्षण एवं सेवा अभियान" data-en="Gau Sanrakshan & Seva Abhiyan"></h3>
          <p data-hi="घायल, बीमार, लाचार और बेसहारा गौवंश को उपचार, सुरक्षित आश्रय और नियमित पोषण सहायता से जोड़ने वाली करुणा-आधारित पहल।" data-en="A compassion-led initiative that supports injured, abandoned and vulnerable cows through medical aid, safe shelter and regular nutrition support."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="सेवा" data-en="Care"></strong>
              <span data-hi="उपचार, संरक्षण और भोजन" data-en="Care, protection and nourishment"></span>
            </div>
            <div>
              <strong data-hi="₹100+" data-en="₹100+"></strong>
              <span data-hi="लचीले दान विकल्प" data-en="Flexible giving options"></span>
            </div>
          </div>
          <div class="btn-row">
            <a class="btn btn-primary" href="https://razorpay.me/@basindia" target="_blank" rel="noopener" data-hi="अभी दान करें" data-en="Donate Now"></a>
            <button type="button" class="btn btn-outline toggle-readmore" data-target="gausevaDetailSection"></button>
          </div>
        </div>
      </article>

      <!-- 5. HEALTH / WOMEN -->
      <article class="program-card">
        <img src="assets/initiatives/women.png" alt="Women Empowerment">
        <div class="body">
          <span class="program-tag" data-hi="महिला सशक्तिकरण" data-en="Women Empowerment"></span>
          <h3 data-hi="महिला आत्मनिर्भरता कार्यक्रम" data-en="Women Self-Reliance Programme"></h3>
          <p data-hi="महिलाओं और युवतियों के लिए कौशल, आत्मविश्वास, आजीविका उन्मुख सोच और सामाजिक सम्मान की दिशा में समर्थन।" data-en="Support for women and young girls through skills, confidence, livelihood orientation and social dignity."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="Skills" data-en="Skills"></strong>
              <span data-hi="स्वावलंबन की नींव" data-en="Foundation for independence"></span>
            </div>
            <div>
              <strong data-hi="Dignity" data-en="Dignity"></strong>
              <span data-hi="सम्मानजनक अवसर" data-en="Respectful opportunities"></span>
            </div>
          </div>
          <div class="btn-row">
            <a class="btn btn-primary" href="donate.html" data-hi="महिला पहल को समर्थन" data-en="Support women-focused work"></a>
          </div>
        </div>
      </article>

      <!-- 6. OLD AGE -->
      <article class="program-card">
        <img src="assets/initiatives/oldage.png" alt="Elder Care">
        <div class="body">
          <span class="program-tag" data-hi="वृद्धजन" data-en="Elder Care"></span>
          <h3 data-hi="वृद्धजन सम्मान सेवा" data-en="Elder Dignity Support"></h3>
          <p data-hi="वृद्धजनों के सम्मान, संवेदना और आवश्यक सहयोग की दिशा में सामुदायिक सहारा उपलब्ध कराने का प्रयास।" data-en="An effort to provide community support with dignity, care and sensitivity for elderly citizens."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="Care" data-en="Care"></strong>
              <span data-hi="सम्मानजनक सहयोग" data-en="Dignified support"></span>
            </div>
            <div>
              <strong data-hi="Presence" data-en="Presence"></strong>
              <span data-hi="अकेलेपन में सहारा" data-en="Support against isolation"></span>
            </div>
          </div>
          <div class="btn-row">
            <a class="btn btn-primary" href="contact.html" data-hi="जानकारी साझा करें" data-en="Share a case"></a>
          </div>
        </div>
      </article>

      <!-- 7. SKILL -->
      <article class="program-card">
        <img src="assets/initiatives/skill.png" alt="Skill Development">
        <div class="body">
          <span class="program-tag" data-hi="कौशल विकास" data-en="Skill Development"></span>
          <h3 data-hi="युवा कौशल एवं स्वावलंबन" data-en="Youth Skills & Self-Reliance"></h3>
          <p data-hi="युवाओं को आत्मनिर्भर सोच, उपयोगी कौशल और बेहतर सामाजिक-आर्थिक अवसरों की दिशा में प्रेरित करने की पहल।" data-en="An initiative to guide youth toward self-reliance, useful skills and stronger socio-economic opportunities."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="Skills" data-en="Skills"></strong>
              <span data-hi="रोज़गारोन्मुख तैयारी" data-en="Employment-oriented readiness"></span>
            </div>
            <div>
              <strong data-hi="Confidence" data-en="Confidence"></strong>
              <span data-hi="स्वविश्वास और दिशा" data-en="Self-belief and direction"></span>
            </div>
          </div>
          <div class="btn-row">
            <a class="btn btn-primary" href="contact.html" data-hi="युवा कार्यक्रम से जुड़ें" data-en="Join youth programmes"></a>
          </div>
        </div>
      </article>

    </div>
  </section>

  <!-- DETAILED SHIKSHA SARATHI SECTION BELOW GRID -->
  <section class="section initiative-detail detail-toggle-content" id="shikshaDetailSection">
    <div class="wrap">
      <div class="detail-divider"></div>
      <h2 class="initiative-section-heading" data-hi="शिक्षा सारथी — कोई भी बच्चा केवल अध्ययन सामग्री के अभाव में स्कूल न छोड़े" data-en="Shiksha Sarathi — No child should leave school due to lack of basic learning resources"></h2>

      <div class="initiative-feature">
        <div class="initiative-feature-grid">
          <div class="initiative-feature-media">
            <img src="assets/initiatives/shiksha-sarathi.png" alt="Shiksha Sarathi Detailed Section">
          </div>

          <div class="initiative-feature-body">
            <span class="initiative-kicker" data-hi="📚 प्रमुख पहल" data-en="📚 Flagship Initiative"></span>
            <h2 data-hi="शिक्षा सारथी — कोई भी बच्चा केवल अध्ययन सामग्री के अभाव में स्कूल न छोड़े" data-en="Shiksha Sarathi — No child should leave school due to lack of basic learning resources"></h2>
            <p class="initiative-lead" data-hi="“शिक्षा सारथी” हमारा प्रमुख कार्यक्रम है, जिसका उद्देश्य आर्थिक रूप से कमजोर परिवारों के बच्चों को अध्ययन सामग्री, स्कूल आवश्यकताएँ और शैक्षिक सहयोग देकर उन्हें शिक्षा से जोड़े रखना है।" data-en="“Shiksha Sarathi” is our flagship programme with a simple but powerful vision: no child should drop out of school because they lack basic learning resources, school essentials and academic support."></p>

            <div class="initiative-blocks">
              <div class="initiative-box">
                <h3 data-hi="🎯 अभियान उद्देश्य (FY 2026–27)" data-en="🎯 Campaign Objective (FY 2026–27)"></h3>
                <p data-hi="5000 वंचित एवं जरूरतमंद बच्चों को संपूर्ण स्टडी किट और आवश्यक शैक्षिक सहायता उपलब्ध कराना।" data-en="To support 5000 underprivileged children by providing complete study kits and essential academic support."></p>
              </div>

              <div class="initiative-box">
                <h3 data-hi="💔 हम किस चुनौती को संबोधित कर रहे हैं" data-en="💔 The Challenge We Are Addressing"></h3>

            <p class="initiative-lead" data-hi="भारत में हर दिन लगभग 24,012 मरीजों की मौत समय पर एम्बुलेंस न पहुँचने या चिकित्सा सहायता में देरी के कारण होती है। कई बार जिंदगी और मौत के बीच सिर्फ एक एम्बुलेंस का फासला होता है। यह पहल उसी फासले को कम करने और जरूरतमंद परिवारों तक समय पर जीवनरक्षक सहायता पहुँचाने का प्रयास है।" data-en="In India, nearly 24,012 patients die every day due to delayed ambulance access or late medical assistance. Sometimes, the difference between life and death is just one ambulance away. This initiative is designed to reduce that gap and deliver life-saving transport support to those who need it most."></p>

  <script>
    (function(){
      function currentLang(){
        return localStorage.getItem('bas_lang') || 'hi';
      }

      function setButtonLabel(btn, isOpen){
        const lang = currentLang();
        const labels = {
          hi: { open: 'पूरा विवरण पढ़ें', close: 'विवरण बंद करें' },
          en: { open: 'Read More', close: 'Hide Details' }
        };
        btn.textContent = isOpen ? labels[lang].close : labels[lang].open;
      }

      function getButtonsForTarget(targetId){
        return document.querySelectorAll('.toggle-readmore[data-target="' + targetId + '"]');
      }

      function updateButtonsForTarget(targetId, isOpen){
        getButtonsForTarget(targetId).forEach((btn)=>{
          setButtonLabel(btn, isOpen);
        });
      }

      function closeOtherDetailSections(currentId){
        document.querySelectorAll('.detail-toggle-content').forEach((section)=>{
          if(section.id !== currentId){
            section.classList.remove('open');
            updateButtonsForTarget(section.id, false);
          }
        });
      }

      function toggleSection(targetId){
        const target = document.getElementById(targetId);
        if(!target) return;

        const wasOpen = target.classList.contains('open');

        closeOtherDetailSections(targetId);

        if(wasOpen){
          target.classList.remove('open');
          updateButtonsForTarget(targetId, false);
          return;
        }

        target.classList.add('open');
        updateButtonsForTarget(targetId, true);

        setTimeout(() => {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 120);
      }

      function initReadMoreToggles(){
        const buttons = document.querySelectorAll('.toggle-readmore');

        buttons.forEach((btn)=>{
          const targetId = btn.getAttribute('data-target');
          const target = document.getElementById(targetId);
          const isOpen = target && target.classList.contains('open');
          setButtonLabel(btn, isOpen);

          btn.addEventListener('click', function(){
            toggleSection(targetId);
          });
        });
      }

      function refreshToggleTexts(){
        document.querySelectorAll('.toggle-readmore').forEach((btn)=>{
          const targetId = btn.getAttribute('data-target');
          const target = document.getElementById(targetId);
          const isOpen = target && target.classList.contains('open');
          setButtonLabel(btn, isOpen);
        });
      }

      document.addEventListener('DOMContentLoaded', function(){
        initReadMoreToggles();
        refreshToggleTexts();

        const langToggle = document.getElementById('langToggle');
        if(langToggle){
          langToggle.addEventListener('click', function(){
            setTimeout(refreshToggleTexts, 80);
          });
        }
      });

      window.addEventListener('storage', refreshToggleTexts);
    })();
  </script>
