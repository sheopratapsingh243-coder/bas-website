<!doctype html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Initiatives | Bharat Abhyudaya Sansthan</title>
  <meta name="description" content="Explore the key initiatives of Bharat Abhyudaya Sansthan across education, healthcare, women empowerment, cow care, heritage conservation and emergency support.">
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
  /* SAME FONT SCALE AS INDEX / ABOUT */
  .hero h1{
    font-size: clamp(1.55rem, 2.5vw, 2.15rem) !important;
    line-height: 1.16;
    max-width: 680px;
    margin-bottom: 14px;
  }

  .hero p{
    max-width: 640px;
    font-size: .95rem;
    line-height: 1.68;
  }

  .hero .wrap{
    position: relative;
    z-index: 2;
  }

  .hero{
    overflow: hidden;
  }

  .section-title{
    font-size: clamp(1.6rem, 2.4vw, 2.1rem) !important;
    letter-spacing: -.02em;
  }

  .section-sub{
    font-size: .95rem !important;
    line-height: 1.65 !important;
  }

  .program-card .body p{
    font-size: .95rem;
    line-height: 1.65;
  }

  .program-card h3{
    line-height: 1.25;
  }

  .program-tag{
    font-size: .82rem;
  }

  .program-metrics strong{
    font-size: .92rem;
  }

  .program-metrics span{
    font-size: .9rem;
    line-height: 1.5;
  }

  .steps li,
  .check-list li{
    font-size: .95rem;
    line-height: 1.6;
  }

  /* SHIKSHA SARATHI DETAIL SECTION */
  .initiative-detail{
    padding-top: 8px;
  }

  .initiative-feature{
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
    
  /* IMAGE TOP, CONTENT BELOW */
.initiative-feature-grid{
  display: grid;
  grid-template-columns: 1fr;
}

.initiative-feature-media{
  background: #f8fafc;
  line-height: 0;
  padding: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.initiative-feature-media img{
  width: 100%;
  height: auto;
  max-height: 520px;
  display: block;
  object-fit: contain;
  object-position: center;
  border-radius: 16px;
}

  .initiative-feature-body{
    padding: 28px;
  }

  .initiative-kicker{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(11,90,166,.08);
    color: var(--brand);
    border: 1px solid rgba(11,90,166,.12);
    padding: 7px 12px;
    border-radius: 999px;
    font-size: .82rem;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .initiative-feature-body h2{
    margin: 0 0 12px;
    font-size: clamp(1.45rem, 2.4vw, 2rem);
    line-height: 1.18;
    letter-spacing: -.02em;
  }

  .initiative-lead{
    margin: 0 0 18px;
    font-size: .98rem;
    line-height: 1.72;
    color: var(--muted);
  }

  .initiative-blocks{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 18px;
  }

  .initiative-box{
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }

  .initiative-box h3{
    margin: 0 0 10px;
    font-size: 1rem;
    line-height: 1.3;
  }

  .initiative-box p{
    margin: 0;
    font-size: .94rem;
    line-height: 1.68;
    color: var(--muted);
  }

  .initiative-box ul{
    margin: 0;
    padding-left: 18px;
  }

  .initiative-box li{
    margin: 0 0 8px;
    font-size: .94rem;
    line-height: 1.62;
    color: var(--muted);
  }

  .support-grid{
    display: grid;
    grid-template-columns: repeat(2, minmax(0,1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .support-item{
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 15px;
  }

  .support-item strong{
    display: block;
    margin-bottom: 4px;
    font-size: .95rem;
  }

  .support-item span{
    font-size: .92rem;
    line-height: 1.55;
    color: var(--muted);
  }

  .cost-list{
    margin-top: 10px;
  }

  .cost-list li strong{
    color: var(--fg);
  }

  .timeline-list li,
  .trust-list li{
    margin-bottom: 8px;
  }

  .initiative-cta{
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 22px;
  }

  .initiative-note{
    margin-top: 14px;
    font-size: .92rem;
    line-height: 1.65;
    color: var(--muted);
  }

  @media (max-width: 900px){
    .hero h1{
      font-size: clamp(1.45rem, 7vw, 1.95rem) !important;
    }

    .hero p{
      font-size: .92rem;
    }

    .program-card .body p,
    .steps li,
    .check-list li{
      font-size: .92rem;
    }

    .initiative-feature-media img{
      height: clamp(190px, 52vw, 280px);
    }

    .initiative-feature-body{
      padding: 20px;
    }

    .initiative-blocks{
      grid-template-columns: 1fr;
    }

    .support-grid{
      grid-template-columns: 1fr;
    }
  }
  </style>
</head>
<body>
  <div id="header"></div>
  <div class="topbar-space"></div>

  <section class="hero">
    <div class="wrap">
      <span class="kicker" data-hi="हमारे प्रयास" data-en="Our Initiatives"></span>
      <h1 data-hi="ऐसी पहलें जो ज़मीन पर उपयोगी, मानवीय और विश्वसनीय असर छोड़ें।" data-en="Initiatives designed to create useful, humane and credible change on the ground."></h1>
      <p data-hi="हमारी प्रत्येक पहल का उद्देश्य केवल एक सेवा गतिविधि चलाना नहीं, बल्कि किसी वास्तविक सामाजिक आवश्यकता को व्यवस्थित, सम्मानजनक और भरोसेमंद सहयोग से संबोधित करना है।" data-en="Each initiative is designed not merely as an activity, but as a structured, dignified and trustworthy response to a real social need."></p>
    </div>
  </section>

  <!-- DETAILED SHIKSHA SARATHI SECTION JUST BELOW HERO -->
  <section class="section initiative-detail">
    <div class="wrap">
      <div class="initiative-feature">
        <div class="initiative-feature-grid">
          <div class="initiative-feature-media">
            <img src="assets/initiatives/shiksha-sarathi.png" alt="Shiksha Sarathi Detailed Section">
          </div>

          <div class="initiative-feature-body">
            <span class="initiative-kicker" data-hi="📚 प्रमुख पहल" data-en="📚 Flagship Initiative"></span>
            <h2 data-hi="शिक्षा सारथी — कोई भी बच्चा केवल अध्ययन सामग्री के अभाव में स्कूल न छोड़े" data-en="Shiksha Sarathi — No child should leave school due to lack of basic learning resources"></h2>
            <p class="initiative-lead" data-hi="“शिक्षा सारथी” हमारा प्रमुख कार्यक्रम है, जिसका उद्देश्य आर्थिक रूप से कमजोर परिवारों के बच्चों को अध्ययन सामग्री, स्कूल आवश्यकताएँ और शैक्षिक सहयोग देकर उन्हें शिक्षा से जोड़े रखना है।" data-en="“Shiksha Sarathi” is our flagship programme with a simple but powerful vision: no child should drop out of school because they lack basic learning resources, school essentials and academic support."></p>

            <div class="initiative-blocks">
              <div class="initiative-box">
                <h3 data-hi="🎯 अभियान उद्देश्य (FY 2026–27)" data-en="🎯 Campaign Objective (FY 2026–27)"></h3>
                <p data-hi="5000 वंचित एवं जरूरतमंद बच्चों को संपूर्ण स्टडी किट और आवश्यक शैक्षिक सहायता उपलब्ध कराना।" data-en="To support 5000 underprivileged children by providing complete study kits and essential academic support."></p>
              </div>

              <div class="initiative-box">
                <h3 data-hi="💔 हम किस चुनौती को संबोधित कर रहे हैं" data-en="💔 The Challenge We Are Addressing"></h3>
                <ul>
                  <li data-hi="कई ग्रामीण और आर्थिक रूप से कमजोर परिवारों के बच्चे कॉपियाँ, किताबें और स्टेशनरी जैसी बुनियादी सामग्री के अभाव में पढ़ाई से पीछे रह जाते हैं।" data-en="In many rural and economically weaker communities, children fall behind because they lack basic study materials such as notebooks, books and stationery."></li>
                  <li data-hi="छोटी आर्थिक कमी भी स्कूल अनुपस्थिति, पढ़ाई में गिरावट और अंततः ड्रॉपआउट का कारण बन जाती है।" data-en="Even a small financial gap can lead to absenteeism, declining academic performance and eventual dropout."></li>
                  <li data-hi="यह पहल शिक्षा और आशा के बीच बने इस अंतर को भरने का प्रयास है।" data-en="This initiative aims to bridge that gap and keep children connected to education and hope."></li>
                </ul>
              </div>

              <div class="initiative-box">
                <h3 data-hi="👧👦 लाभार्थी कौन होंगे" data-en="👧👦 Who Will Benefit"></h3>
                <ul>
                  <li data-hi="आर्थिक रूप से कमजोर परिवारों के बच्चे" data-en="Children from economically weaker families"></li>
                  <li data-hi="ग्रामीण और अर्ध-शहरी क्षेत्रों के विद्यार्थी" data-en="Rural and semi-urban students"></li>
                  <li data-hi="वे छात्र जो आर्थिक कठिनाई के कारण ड्रॉपआउट के जोखिम में हैं" data-en="Students at risk of dropping out due to financial hardship"></li>
                </ul>
              </div>

              <div class="initiative-box">
                <h3 data-hi="💰 सहयोग मॉडल एवं लागत संरचना" data-en="💰 Support Model & Cost Structure"></h3>
                <p data-hi="प्रति बच्चे अनुमानित सहयोग लागत: ₹2500 – ₹3000" data-en="Per child support cost: ₹2500 – ₹3000"></p>
                <ul class="cost-list">
                  <li data-hi="<strong>स्टडी किट:</strong> किताबें, कॉपियाँ, स्टेशनरी — ₹2000" data-en="<strong>Study Kit:</strong> Books, notebooks, stationery — ₹2000"></li>
                  <li data-hi="<strong>स्कूल आवश्यकताएँ:</strong> बैग एवं उपयोगी सामग्री — ₹700" data-en="<strong>School Essentials:</strong> Bag and useful supplies — ₹700"></li>
                  <li data-hi="<strong>वितरण एवं लॉजिस्टिक्स:</strong> ₹100" data-en="<strong>Distribution & Logistics:</strong> ₹100"></li>
                  <li data-hi="<strong>प्रशासन एवं मॉनिटरिंग:</strong> ₹200" data-en="<strong>Administration & Monitoring:</strong> ₹200"></li>
                </ul>
              </div>
            </div>

            <div class="initiative-box" style="margin-top:16px;">
              <h3 data-hi="🤝 दानदाताओं के लिए सहयोग विकल्प" data-en="🤝 Support Options for Donors"></h3>
              <p data-hi="आप अपनी इच्छा के अनुसार जितने भी बच्चों को सहयोग देना चाहें, दे सकते हैं:" data-en="You may support as many children as you wish:"></p>

              <div class="support-grid">
                <div class="support-item">
                  <strong data-hi="1 बच्चा" data-en="1 Child"></strong>
                  <span data-hi="₹2500 – ₹3000" data-en="₹2500 – ₹3000"></span>
                </div>
                <div class="support-item">
                  <strong data-hi="5 बच्चे" data-en="5 Children"></strong>
                  <span data-hi="₹12,500 – ₹15,000" data-en="₹12,500 – ₹15,000"></span>
                </div>
                <div class="support-item">
                  <strong data-hi="10 बच्चे" data-en="10 Children"></strong>
                  <span data-hi="₹25,000 – ₹30,000" data-en="₹25,000 – ₹30,000"></span>
                </div>
                <div class="support-item">
                  <strong data-hi="25 बच्चे" data-en="25 Children"></strong>
                  <span data-hi="₹62,500 – ₹75,000" data-en="₹62,500 – ₹75,000"></span>
                </div>
                <div class="support-item">
                  <strong data-hi="50 बच्चे" data-en="50 Children"></strong>
                  <span data-hi="₹1,25,000 – ₹1,50,000" data-en="₹1,25,000 – ₹1,50,000"></span>
                </div>
                <div class="support-item">
                  <strong data-hi="100 बच्चे" data-en="100 Children"></strong>
                  <span data-hi="₹2,50,000 – ₹3,00,000" data-en="₹2,50,000 – ₹3,00,000"></span>
                </div>
              </div>
            </div>

            <div class="initiative-blocks" style="margin-top:16px;">
              <div class="initiative-box">
                <h3 data-hi="📅 परियोजना समयरेखा (FY 2026–27)" data-en="📅 Project Timeline (FY 2026–27)"></h3>
                <ul class="timeline-list">
                  <li data-hi="अप्रैल – मई 2026: लाभार्थियों की पहचान एवं बेसलाइन सर्वे" data-en="April – May 2026: Beneficiary identification & baseline survey"></li>
                  <li data-hi="जून 2026: अध्ययन सामग्री की खरीद" data-en="June 2026: Procurement of study materials"></li>
                  <li data-hi="जून – जुलाई 2026: वितरण चरण" data-en="June – July 2026: Distribution phases"></li>
                  <li data-hi="अगस्त – सितंबर 2026: अंतिम रिपोर्टिंग" data-en="Aug – Sept 2026: Final reporting"></li>
                  <li data-hi="जुलाई 2026 – मार्च 2027: मॉनिटरिंग एवं प्रभाव आकलन" data-en="July 2026 – March 2027: Monitoring & impact assessment"></li>
                </ul>
              </div>

              <div class="initiative-box">
                <h3 data-hi="🔍 पारदर्शिता एवं भरोसा" data-en="🔍 Transparency & Trust"></h3>
                <ul class="trust-list">
                  <li data-hi="धनराशि का उचित एवं उद्देश्यपूर्ण उपयोग" data-en="Proper utilization of funds"></li>
                  <li data-hi="नियमित अपडेट्स और दस्तावेज़ीकरण" data-en="Regular updates and documentation"></li>
                  <li data-hi="आधिकारिक दान रसीदें" data-en="Official donation receipts"></li>
                </ul>
              </div>
            </div>

            <div class="initiative-cta">
              <a class="btn btn-primary" href="https://razorpay.me/@basindia" target="_blank" rel="noopener" data-hi="अभी दान करें" data-en="Donate Now"></a>
              <a class="btn btn-outline" href="donate.html" data-hi="दान पृष्ठ देखें" data-en="View Donate Page"></a>
            </div>

            <p class="initiative-note" data-hi="आप अपनी इच्छा के अनुसार एक बच्चे से लेकर अनेक बच्चों तक का सहयोग चुन सकते हैं। आपका योगदान केवल सामग्री नहीं देता, बल्कि एक बच्चे को स्कूल से जोड़े रखने की वास्तविक संभावना भी देता है।" data-en="You may choose to support one child or many. Your contribution does not just provide materials—it helps keep a child connected to school, continuity and hope."></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="section tight">
    <div class="wrap program-grid">
      <article class="program-card">
        <img src="assets/initiatives/shiksha-sarathi.png" alt="Shiksha Sarathi">
        <div class="body">
          <span class="program-tag" data-hi="शिक्षा" data-en="Education"></span>
          <h3 data-hi="शिक्षा सारथी अभियान" data-en="Shiksha Sarathi Campaign"></h3>
          <p data-hi="हमारा प्रमुख शिक्षा कार्यक्रम, जिसका उद्देश्य आर्थिक रूप से कमजोर बच्चों को अध्ययन सामग्री, स्कूल आवश्यकताएँ और शैक्षिक सहयोग देकर ड्रॉपआउट रोकना है।" data-en="Our flagship education programme focused on preventing dropouts by providing study kits, school essentials and academic support to underprivileged children."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="5000+" data-en="5000+"></strong>
              <span data-hi="FY 2026–27 में लक्षित बच्चे" data-en="Target children in FY 2026–27"></span>
            </div>
            <div>
              <strong data-hi="₹2500–₹3000" data-en="₹2500–₹3000"></strong>
              <span data-hi="प्रति बच्चे अनुमानित सहयोग लागत" data-en="Approximate support cost per child"></span>
            </div>
          </div>
          <div class="btn-row"><a class="btn btn-primary" href="donate.html" data-hi="इस पहल को सहयोग दें" data-en="Support this initiative"></a></div>
        </div>
      </article>

      <article class="program-card">
        <img src="assets/initiatives/health.png" alt="Health Support">
        <div class="body">
          <span class="program-tag" data-hi="स्वास्थ्य" data-en="Healthcare"></span>
          <h3 data-hi="स्वास्थ्य सहायता सेवा" data-en="Healthcare Support Service"></h3>
          <p data-hi="स्वास्थ्य संबंधी ज़रूरतों, जागरूकता, पहुँच और मानवीय सहायता को बेहतर बनाने की दिशा में सहयोग।" data-en="Support aimed at strengthening access, awareness and humanitarian help around healthcare needs."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="Care" data-en="Care"></strong>
              <span data-hi="राहत से आगे सहानुभूतिपूर्ण सहयोग" data-en="Compassionate support beyond relief"></span>
            </div>
            <div>
              <strong data-hi="Reach" data-en="Reach"></strong>
              <span data-hi="उचित समय पर सहायता" data-en="Timely support"></span>
            </div>
          </div>
          <div class="btn-row"><a class="btn btn-primary" href="contact.html" data-hi="समन्वय हेतु संपर्क" data-en="Contact for coordination"></a></div>
        </div>
      </article>

      <article class="program-card">
        <img src="assets/initiatives/women.png" alt="Women Empowerment">
        <div class="body">
          <span class="program-tag" data-hi="महिला सशक्तिकरण" data-en="Women Empowerment"></span>
          <h3 data-hi="महिला आत्मनिर्भरता कार्यक्रम" data-en="Women Self-Reliance Programme"></h3>
          <p data-hi="महिलाओं और युवतियों के लिए कौशल, आत्मविश्वास, आजीविका उन्मुख सोच और सामाजिक सम्मान की दिशा में समर्थन।" data-en="Support for women and young girls through skills, confidence, livelihood orientation and social dignity."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="Skills" data-en="Skills"></strong>
              <span data-hi="स्वावलंबन की नींव" data-en="Foundation for independence"></span>
            </div>
            <div>
              <strong data-hi="Dignity" data-en="Dignity"></strong>
              <span data-hi="सम्मानजनक अवसर" data-en="Respectful opportunities"></span>
            </div>
          </div>
          <div class="btn-row"><a class="btn btn-primary" href="donate.html" data-hi="महिला पहल को समर्थन" data-en="Support women-focused work"></a></div>
        </div>
      </article>

      <article class="program-card">
        <img src="assets/initiatives/gauseva.png" alt="Gauseva">
        <div class="body">
