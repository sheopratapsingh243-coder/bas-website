<!doctype html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Initiatives | Bharat Abhyudaya Sansthan</title>
  <meta name="description" content="Explore the key initiatives of Bharat Abhyudaya Sansthan across education, healthcare, women empowerment, cow care, heritage conservation and emergency support.">
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
  /* SAME FONT SCALE AS INDEX / ABOUT */
  .hero h1{
    font-size: clamp(1.55rem, 2.5vw, 2.15rem) !important;
    line-height: 1.16;
    max-width: 680px;
    margin-bottom: 14px;
  }

  .hero p{
    max-width: 640px;
    font-size: .95rem;
    line-height: 1.68;
  }

  .hero .wrap{
    position: relative;
    z-index: 2;
  }

  .hero{
    overflow: hidden;
  }

  .section-title{
    font-size: clamp(1.6rem, 2.4vw, 2.1rem) !important;
    letter-spacing: -.02em;
  }

  .section-sub{
    font-size: .95rem !important;
    line-height: 1.65 !important;
  }

  .program-card .body p{
    font-size: .95rem;
    line-height: 1.65;
  }

  .program-card h3{
    line-height: 1.25;
  }

  .program-tag{
    font-size: .82rem;
  }

  .program-metrics strong{
    font-size: .92rem;
  }

  .program-metrics span{
    font-size: .9rem;
    line-height: 1.5;
  }

  .steps li,
  .check-list li{
    font-size: .95rem;
    line-height: 1.6;
  }

  .btn-row{
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 18px;
    align-items: center;
  }

  .btn-row .btn,
  .detail-actions .btn{
    min-width: 150px;
    text-align: center;
  }

  /* DETAIL SECTIONS */
  .initiative-detail{
    padding-top: 8px;
  }

  .detail-divider{
    border-top: 1px solid #e2e8f0;
    margin: 8px 0 24px;
  }

  .initiative-feature{
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .initiative-feature-grid{
    display: grid;
    grid-template-columns: 1fr;
  }

  .initiative-section-heading{
    margin: 0 0 16px;
    font-size: clamp(1.4rem, 2.2vw, 2rem);
    line-height: 1.2;
    letter-spacing: -.02em;
    color: var(--fg);
  }

  .initiative-feature-media{
    background: #f8fafc;
    line-height: 0;
    padding: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .initiative-feature-media img{
    width: 100%;
    height: auto;
    max-height: 520px;
    display: block;
    object-fit: contain;
    object-position: center;
    border-radius: 16px;
  }

  .initiative-feature-body{
    padding: 28px;
  }

  .initiative-kicker{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(11,90,166,.08);
    color: var(--brand);
    border: 1px solid rgba(11,90,166,.12);
    padding: 7px 12px;
    border-radius: 999px;
    font-size: .82rem;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .initiative-feature-body h2{
    margin: 0 0 12px;
    font-size: clamp(1.45rem, 2.4vw, 2rem);
    line-height: 1.18;
    letter-spacing: -.02em;
  }

  .initiative-lead{
    margin: 0 0 18px;
    font-size: .98rem;
    line-height: 1.72;
    color: var(--muted);
  }

  .initiative-blocks{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 18px;
  }

  .initiative-box{
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }

  .initiative-box h3{
    margin: 0 0 10px;
    font-size: 1rem;
    line-height: 1.3;
  }

  .initiative-box p{
    margin: 0;
    font-size: .94rem;
    line-height: 1.68;
    color: var(--muted);
  }

  .initiative-box ul,
  .initiative-box ol{
    margin: 0;
    padding-left: 18px;
  }

  .initiative-box li{
    margin: 0 0 8px;
    font-size: .94rem;
    line-height: 1.62;
    color: var(--muted);
  }

  .support-grid{
    display: grid;
    grid-template-columns: repeat(2, minmax(0,1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .support-item{
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 15px;
  }

  .support-item strong{
    display: block;
    margin-bottom: 4px;
    font-size: .95rem;
  }

  .support-item span{
    font-size: .92rem;
    line-height: 1.55;
    color: var(--muted);
  }

  .cost-list{
    margin-top: 10px;
  }

  .cost-list li strong{
    color: var(--fg);
  }

  .timeline-list li,
  .trust-list li{
    margin-bottom: 8px;
  }

  .initiative-note{
    margin-top: 14px;
    font-size: .92rem;
    line-height: 1.65;
    color: var(--muted);
  }

  .detail-actions{
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 0 0 18px;
    align-items: center;
  }

  .detail-toggle-content{
    display: none;
    animation: fadeBlock .28s ease;
  }

  .detail-toggle-content.open{
    display: block;
  }

  .toggle-readmore{
    cursor: pointer;
  }

  @keyframes fadeBlock{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }

/* FULL SCREEN IMAGE VIEWER FOR PROGRAM GRID + DETAIL IMAGES */
.program-card > img,
.initiative-feature-media img{
  cursor: zoom-in;
  transition: transform .25s ease, filter .25s ease;
}

.program-card > img:hover,
.initiative-feature-media img:hover{
  transform: scale(1.015);
  filter: brightness(.96);
}

.image-lightbox{
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: rgba(2, 6, 23, .92);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 22px;
}

.image-lightbox.open{
  display: flex;
}

.image-lightbox-inner{
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.image-lightbox img{
  max-width: 94vw;
  max-height: 86vh;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 18px;
  box-shadow: 0 24px 80px rgba(0,0,0,.45);
  background: #fff;
  transform: scale(1);
  transform-origin: center center;
  transition: transform .22s ease;
  cursor: grab;
  user-select: none;
}

.image-lightbox img.dragging{
  cursor: grabbing;
}

.image-lightbox-close{
  position: absolute;
  top: 16px;
  right: 16px;
  width: 44px;
  height: 44px;
  border: 0;
  border-radius: 999px;
  background: #ffffff;
  color: #0f172a;
  font-size: 30px;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 12px 30px rgba(0,0,0,.28);
  z-index: 4;
}

.image-lightbox-close:hover{
  background: #f1f5f9;
}

.image-lightbox-caption{
  position: absolute;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  max-width: 90vw;
  background: rgba(255,255,255,.92);
  color: #0f172a;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: .9rem;
  font-weight: 700;
  text-align: center;
  box-shadow: 0 10px 26px rgba(0,0,0,.18);
  z-index: 3;
}

.image-zoom-controls{
  position: absolute;
  top: 16px;
  left: 16px;
  display: flex;
  gap: 8px;
  z-index: 4;
  background: rgba(255,255,255,.92);
  padding: 7px;
  border-radius: 999px;
  box-shadow: 0 12px 30px rgba(0,0,0,.22);
}

.image-zoom-controls button{
  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 999px;
  background: #ffffff;
  color: #0f172a;
  font-size: 20px;
  font-weight: 800;
  cursor: pointer;
}

.image-zoom-controls button:hover{
  background: #e2e8f0;
}

body.lightbox-lock{
  overflow: hidden;
}

@media (max-width: 700px){
  .image-lightbox{
    padding: 12px;
  }

  .image-lightbox img{
    max-width: 96vw;
    max-height: 82vh;
    border-radius: 14px;
  }

  .image-lightbox-close{
    top: 10px;
    right: 10px;
  }

  .image-zoom-controls{
    top: 10px;
    left: 10px;
  }

  .image-zoom-controls button{
    width: 34px;
    height: 34px;
    font-size: 18px;
  }

  .image-lightbox-caption{
    bottom: 12px;
    font-size: .78rem;
    border-radius: 14px;
  }
}
  </style>
</head>
<body>
  <div id="header"></div>
  <div class="topbar-space"></div>

  <section class="hero">
    <div class="wrap">
      <span class="kicker" data-hi="हमारे प्रयास" data-en="Our Initiatives"></span>
      <h1 data-hi="ऐसी पहलें जो ज़मीन पर उपयोगी, मानवीय और विश्वसनीय असर छोड़ें।" data-en="Initiatives designed to create useful, humane and credible change on the ground."></h1>
      <p data-hi="हमारी प्रत्येक पहल का उद्देश्य केवल एक सेवा गतिविधि चलाना नहीं, बल्कि किसी वास्तविक सामाजिक आवश्यकता को व्यवस्थित, सम्मानजनक और भरोसेमंद सहयोग से संबोधित करना है।" data-en="Each initiative is designed not merely as an activity, but as a structured, dignified and trustworthy response to a real social need."></p>
    </div>
  </section>

  <!-- PROGRAM GRID JUST BELOW HERO -->
  <section class="section tight">
    <div class="wrap program-grid">

      <!-- 1. SHIKSHA -->
      <article class="program-card">
        <img src="assets/initiatives/shikshasarathi.png" alt="Shiksha Sarathi">
        <div class="body">
          <span class="program-tag" data-hi="शिक्षा" data-en="Education"></span>
          <h3 data-hi="शिक्षा सारथी अभियान" data-en="Shiksha Sarathi Campaign"></h3>
          <p data-hi="हमारा प्रमुख शिक्षा कार्यक्रम, जिसका उद्देश्य आर्थिक रूप से कमजोर बच्चों को अध्ययन सामग्री, स्कूल आवश्यकताएँ और शैक्षिक सहयोग देकर ड्रॉपआउट रोकना है।" data-en="Our flagship education programme focused on preventing dropouts by providing study kits, school essentials and academic support to underprivileged children."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="5000+" data-en="5000+"></strong>
              <span data-hi="FY 2026–27 में लक्षित बच्चे" data-en="Target children in FY 2026–27"></span>
            </div>
            <div>
              <strong data-hi="₹2500–₹3000" data-en="₹2500–₹3000"></strong>
              <span data-hi="प्रति बच्चे अनुमानित सहयोग लागत" data-en="Approximate support cost per child"></span>
            </div>
          </div>
          <div class="btn-row">
            <a class="btn btn-primary" href="https://rzp.io/rzp/PfLSQ0HB" target="_blank" rel="noopener" data-hi="अपने जैसा जीवन दें" data-en="Give Life Like You"></a>
            <button type="button" class="btn btn-outline toggle-readmore" data-target="shikshaDetailSection"></button>
          </div>
        </div>
      </article>

      <!-- 2. HERITAGE -->
      <article class="program-card">
        <img src="assets/initiatives/heritage-conservation.png" alt="Heritage Conservation">
        <div class="body">
          <span class="program-tag" data-hi="धरोहर संरक्षण" data-en="Heritage Conservation"></span>
          <h3 data-hi="धरोहर संरक्षण कार्यक्रम" data-en="Heritage Conservation Programme"></h3>
          <p data-hi="स्थानीय इतिहास, संस्कृति और सामुदायिक स्मृति को संरक्षित करने तथा नई पीढ़ी को उससे जोड़ने की पहल।" data-en="A programme to preserve local history, culture and collective memory while connecting younger generations to heritage."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="Culture" data-en="Culture"></strong>
              <span data-hi="पहचान और विरासत की रक्षा" data-en="Protecting identity and heritage"></span>
            </div>
            <div>
              <strong data-hi="Awareness" data-en="Awareness"></strong>
              <span data-hi="जन-जागरूकता और सम्मान" data-en="Public awareness and respect"></span>
            </div>
          </div>
          <div class="btn-row">
            <a class="btn btn-primary" href="https://razorpay.me/@basindia" target="_blank" rel="noopener" data-hi="अभी दान करें" data-en="Donate Now"></a>
            <button type="button" class="btn btn-outline toggle-readmore" data-target="heritageDetailSection"></button>
          </div>
        </div>
      </article>

      <!-- 3. AMBULANCE -->
      <article class="program-card">
        <img src="assets/initiatives/ambulance-seva.png" alt="Jeevan Rakshak Ambulance Seva">
        <div class="body">
          <span class="program-tag" data-hi="आपात जीवनरक्षा" data-en="Emergency Lifeline"></span>
          <h3 data-hi="जीवन रक्षक एम्बुलेंस सेवा" data-en="Jeevan Rakshak Ambulance Seva"></h3>
          <p data-hi="ऐसी आपातकालीन सहायता जो मरीज को समय पर अस्पताल पहुँचाकर परिवार के लिए आशा, राहत और जीवन की संभावना बनाए रखे।" data-en="An emergency support initiative that helps patients reach hospitals on time, turning urgency into hope, relief and a real chance to survive."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="₹2500" data-en="₹2500"></strong>
              <span data-hi="प्रति मरीज औसत सहायता लागत" data-en="Average support cost per patient"></span>
            </div>
            <div>
              <strong data-hi="Rapid" data-en="Rapid"></strong>
              <span data-hi="समय पर अस्पताल पहुँचाना" data-en="Timely hospital access"></span>
            </div>
          </div>
          <div class="btn-row">
            <a class="btn btn-primary" href="https://rzp.io/rzp/vXbJ1wf" target="_blank" rel="noopener" data-hi="अभी दान करें" data-en="Donate Now"></a>
            <button type="button" class="btn btn-outline toggle-readmore" data-target="ambulanceDetailSection"></button>
          </div>
        </div>
      </article>

      <!-- 4. GAUSEVA -->
      <article class="program-card">
        <img src="assets/initiatives/gau-seva.png" alt="Gau Sanrakshan & Seva Abhiyan">
        <div class="body">
          <span class="program-tag" data-hi="गौसेवा" data-en="Cow Care"></span>
          <h3 data-hi="गौसंरक्षण एवं सेवा अभियान" data-en="Gau Sanrakshan & Seva Abhiyan"></h3>
          <p data-hi="घायल, बीमार, लाचार और बेसहारा गौवंश को उपचार, सुरक्षित आश्रय और नियमित पोषण सहायता से जोड़ने वाली करुणा-आधारित पहल।" data-en="A compassion-led initiative that supports injured, abandoned and vulnerable cows through medical aid, safe shelter and regular nutrition support."></p>
          <div class="program-metrics">
            <div>
              <strong data-hi="सेवा" data-en="Care"></strong>
              <span data-hi="उपचार, संरक्षण और भोजन" data-en="Care, protection and nourishment"></span>
            </div>
            <div>
              <strong data-hi="₹100+" data-en="₹100+"></strong>
              <span data-hi="लचीले दान विकल्प" data-en="Flexible giving options"></span>
            </div>
          </div>
          <div class="btn-row">
            <a class="btn btn-primary" href="https://razorpay.me/@basindia" target="_blank" rel="noopener" data-hi="अभी दान करें" data-en="Donate Now"></a>
            <button type="button" class="btn btn-outline toggle-readmore" data-target="gausevaDetailSection"></button>
          </div>
        </div>
      </article>

     <!-- 5. WOMEN SELF-RELIANCE -->
<article class="program-card">

      <div>
        <strong data-hi="Livelihood" data-en="Livelihood"></strong>
        <span data-hi="आजीविका और सम्मान" data-en="Income and dignity"></span>
      </div>
    </div>

      <button type="button" class="btn btn-outline toggle-readmore" data-target="womenDetailSection"></button>

      <a class="btn btn-primary" href="https://razorpay.me/@basindia" target="_blank" rel="noopener"

      <button type="button" class="btn btn-outline toggle-readmore" data-target="elderDetailSection"></button>
    </div>
  </div>

      <!-- 7. SKILL DEVELOPMENT -->

  <img src="assets/initiatives/youth-skills.png" alt="Youth Skills & Self-Reliance">

    <div class="program-metrics">

        <strong data-hi="Skills" data-en="Skills"></strong>
        <span data-hi="रोजगारोन्मुख तैयारी" data-en="Employment-oriented readiness"></span>
      </div>
      <div>
        <strong data-hi="Confidence" data-en="Confidence"></strong>
        <span data-hi="आत्मविश्वास और दिशा" data-en="Self-belief and direction"></span>
      </div>
    </div>

    <div class="btn-row">

              </div>

              <div class="initiative-box">

            <div class="initiative-box" style="margin-top:16px;">
              <h3 data-hi="📋 हम एम्बुलेंस सेवा कैसे प्रदान करते हैं" data-en="📋 How We Provide Ambulance Support"></h3>

                <li data-hi="जरूरत की सूचना मिलते ही संस्था उस क्षेत्र में उपलब्ध निजी एम्बुलेंस सेवा प्रदाताओं से यथाशीघ्र संपर्क कर मरीज के लिए एम्बुलेंस की व्यवस्था करती है।" data-en="As soon as a request is received, the organization coordinates with available local private ambulance service providers to arrange transport as quickly as possible."></li>

                <li data-hi="एम्बुलेंस सेवा प्रदाता के बिल का भुगतान संस्था द्वारा किया जाता है।" data-en="The organization bears and pays the ambulance provider’s bill."></li>
                <li data-hi="इस पूरी प्रक्रिया में संस्था मरीज और एम्बुलेंस सेवा प्रदाता के बीच एक भरोसेमंद सेतु का कार्य करती है।" data-en="Throughout the process, the organization acts as a reliable bridge between the patient and the ambulance service provider."></li>

              <p data-hi="एम्बुलेंस सेवा के लिए आपका दान केवल एक वाहन का खर्च नहीं है — यह किसी परिवार के लिए जीवन वापस लाने का प्रयास है। आप सिर्फ पैसा नहीं देते, आप किसी माँ की प्रार्थना, किसी पिता की उम्मीद और किसी बच्चे के भविष्य को बचाने में भागीदारी करते हैं।" data-en="Your donation for ambulance service is not merely paying for transport—it is an effort to bring life back to a family. You are not just giving money; you are protecting a mother’s prayer, a father’s hope, and a child’s future."></p>

            <p class="initiative-lead" data-hi="भारतीय संस्कृति में गाय को माता का स्थान दिया गया है। वह केवल एक पशु नहीं, बल्कि पोषण, करुणा और सहअस्तित्व का प्रतीक है। जब कोई घायल, लाचार या बेसहारा गौमाता सड़कों पर पीड़ा में दिखती है, तो वह केवल एक जीव की नहीं, बल्कि हमारी संवेदनशीलता की भी परीक्षा होती है। यह पहल उसी करुणा को सेवा में बदलने का प्रयास है।" data-en="In Indian tradition, the cow is revered as a mother figure—a symbol of nourishment, compassion and coexistence. When an injured, abandoned or helpless cow suffers on the streets, it is not only an animal in distress; it is also a test of our collective humanity. This initiative transforms that compassion into organized service."></p>

              </div>

              <div class="initiative-box">
                <h3 data-hi="🎯 हमारा उद्देश्य" data-en="🎯 Our Objective"></h3>
                <p data-hi="आवारा, घायल, बीमार और बेसहारा गायों को आवश्यक चिकित्सा सहायता, सुरक्षित आश्रय और नियमित पोषण उपलब्ध कराना, ताकि उन्हें पीड़ा से राहत और सम्मानजनक देखभाल मिल सके।" data-en="To provide injured, abandoned and vulnerable cows with medical aid, safe shelter and regular nourishment so they may receive relief, recovery and dignified care."></p>

            <div class="initiative-box" style="margin-top:16px;">

                <li data-hi="संस्था के स्वयंसेवक और सदस्य घायल, बीमार, आवारा या लाचार गायों की पहचान कर उन्हें आवश्यक चिकित्सा सहायता दिलाते हैं।" data-en="Our volunteers and members identify injured, sick, abandoned or vulnerable cows and help arrange the required medical care."></li>
                <li data-hi="गायों को सुरक्षित रूप से सरकारी या निजी गौशालाओं तक पहुँचाया जाता है।" data-en="They are safely transported to government or private gaushalas."></li>
                <li data-hi="विभिन्न गौशालाओं में संस्था द्वारा साप्ताहिक रूप से चारा, गुड़, भूसा और अन्य आवश्यक पोषण सामग्री पहुँचाई जाती है।" data-en="The organization regularly delivers fodder, jaggery, dry feed and other essential nutrition materials to different gaushalas on a weekly basis."></li>

                <li data-hi="जहां आवश्यक हो, संस्था वृद्धजनों को उपलब्ध स्थानीय संसाधनों, स्वास्थ्य मार्गदर्शन, सरकारी योजनाओं और सामुदायिक सहयोग से जोड़ने में सहायता करती है।"

          <div class="initiative-box" style="margin-top:16px;">

            <p data-hi="इस पहल के अंतर्गत भारत अभ्युदय संस्थान निजी संस्थाओं या सरकारी सहयोग से संचालित वृद्धाश्रमों को आवश्यकता और उपलब्ध संसाधनों के अनुसार नियमित मासिक सहायता प्रदान करता है। इस सहायता में खाद्य सामग्री, दैनिक उपयोग की वस्तुएं, स्वास्थ्य संबंधी सहयोग, स्वच्छता सामग्री, वस्त्र, बिस्तर, दवाइयां, जलपान और वृद्धजनों की आवश्यकताओं से जुड़ी अन्य सामग्री शामिल हो सकती है।"
               data-en="Under this initiative, Bharat Abhyudaya Sansthan provides regular monthly support to old age homes operated by private institutions or government-supported agencies, based on need and available resources. This support may include food materials, daily-use items, health-related assistance, hygiene supplies, clothing, bedding, medicines, refreshments and other essential support for elderly residents."></p>

              </div>

              <div class="support-item">
                <strong data-hi="5 वृद्धजनों के लिए 1 माह का सहयोग" data-en="Monthly support for 5 elders"></strong>

              </div>

              <div class="support-item">
                <strong data-hi="10 वृद्धजनों के लिए 1 माह का सहयोग" data-en="Monthly support for 10 elders"></strong>

              </div>
            </div>

            <p class="initiative-note"
               data-hi="यह सहयोग वृद्धजनों के लिए भोजन, बुनियादी देखभाल सामग्री, स्वच्छता सहयोग, दवाइयां, जलपान, बिस्तर, वस्त्र और सम्मानजनक सहायता उपलब्ध कराने में सहायक हो सकता है।"
               data-en="This support may help provide food, basic care items, hygiene support, medicines, refreshments, bedding, clothing and dignity-based assistance for elderly residents."></p>
          </div>

          <div class="initiative-box" style="margin-top:16px;">
            <h3 data-hi="🏡 भविष्य की दिशा: संस्था द्वारा स्वयं वृद्धाश्रम स्थापित करना"
                data-en="🏡 Future Vision: Establishing Our Own Old Age Homes"></h3>
            <p data-hi="भारत अभ्युदय संस्थान भविष्य में स्वयं वृद्धाश्रम स्थापित करने की दिशा में भी अग्रसर है। संस्था की दीर्घकालिक योजना ऐसे सुरक्षित, स्वच्छ, संवेदनशील और सम्मानजनक आवासीय केंद्र विकसित करने की है, जहां जरूरतमंद वृद्धजनों को आश्रय, भोजन, चिकित्सा सहायता, भावनात्मक सहयोग, आध्यात्मिक शांति और सामुदायिक वातावरण मिल सके।"
               data-en="Bharat Abhyudaya Sansthan is also moving towards the long-term goal of establishing its own old age homes in the future. The vision is to create safe, clean, caring and dignity-based residential spaces where elderly citizens can receive shelter, food, medical attention, emotional support, spiritual peace and a respectful community environment."></p>
          </div>

          <div class="initiative-box" style="margin-top:16px;">
            <h3 data-hi="🛕 वृद्धजनों के लिए वार्षिक धार्मिक यात्रा कार्यक्रम"
                data-en="🛕 Annual Religious Tour Programme for Elders"></h3>
            <p data-hi="इस पहल के अंतर्गत भारत अभ्युदय संस्थान वृद्धजनों के लिए भारत के प्रमुख धार्मिक स्थलों, तीर्थस्थानों और सांस्कृतिक-आध्यात्मिक स्थलों की वार्षिक धार्मिक यात्रा आयोजित करने की योजना रखता है। इस यात्रा का उद्देश्य वृद्धजनों को आध्यात्मिक शांति, भावनात्मक खुशी, सामाजिक साथ और सम्मानजनक अनुभव प्रदान करना है।"
               data-en="As part of this initiative, Bharat Abhyudaya Sansthan plans to organize an annual religious tour programme for elderly citizens to important religious places in India, including major pilgrimage destinations and culturally significant spiritual places. The objective of this tour is to provide elders with spiritual peace, emotional happiness, social companionship and a memorable experience of dignity and respect."></p>
          </div>

            <div class="support-grid">
              <div class="support-item">
                <strong data-hi="1 वृद्धजन की धार्मिक यात्रा हेतु सहयोग" data-en="Religious tour support for 1 elder"></strong>
                <span data-hi="₹3,000" data-en="₹3,000"></span>
              </div>

              <div class="support-item">
                <strong data-hi="2 वृद्धजनों की धार्मिक यात्रा हेतु सहयोग" data-en="Religious tour support for 2 elders"></strong>
                <span data-hi="₹6,000" data-en="₹6,000"></span>
              </div>

              <div class="support-item">
                <strong data-hi="5 वृद्धजनों की धार्मिक यात्रा हेतु सहयोग" data-en="Religious tour support for 5 elders"></strong>

               data-en="This support may help cover travel coordination, basic refreshments, volunteer assistance, local movement and other essential arrangements during the religious tour."></p>
          </div>

          <div class="initiative-box" style="margin-top:16px;">
            <h3 data-hi="❤️ दानदाताओं के लिए संदेश" data-en="❤️ Message to Donors"></h3>
            <p data-hi="वृद्धजन हमारे अपने माता-पिता के समान हैं। उन्होंने अपना पूरा जीवन परिवार, समाज और संस्कृति को दिया है। जीवन के इस अंतिम पड़ाव में उन्हें केवल भोजन और आश्रय ही नहीं, बल्कि सम्मान, देखभाल, अपनापन और आध्यात्मिक शांति भी मिलनी चाहिए।"
               data-en="Elderly citizens are like our own parents. Many of them have given their entire lives to their families, society and culture. In the later years of life, they deserve not only food and shelter, but also respect, care, companionship and spiritual peace."></p>

            <p data-hi="जिस प्रकार श्रवण कुमार ने अपने अंधे माता-पिता को श्रद्धा और सेवा भाव से तीर्थयात्रा कराई थी, उसी प्रकार समाज के रूप में हमारी भी जिम्मेदारी है कि हम वृद्धजनों को सम्मानजनक जीवन, सुरक्षित देखभाल और पवित्र स्थलों के दर्शन का अवसर प्रदान करें।"
               data-en="Just as Shravan Kumar carried his blind parents on pilgrimage with devotion, our society also has a responsibility to help elderly citizens experience dignity, comfort and the blessings of religious darshan."></p>

            <p data-hi="किसी वृद्धजन का सहयोग केवल दान नहीं है; यह अपने संस्कारों, कर्तव्य और मानवता को जीवित रखने का कार्य है। आपका योगदान किसी वृद्धजन के लिए भोजन, किसी अकेले हृदय के लिए अपनापन, और किसी ऐसे बुजुर्ग के लिए धार्मिक दर्शन की खुशी बन सकता है, जिसने शायद जीवन भर इस अवसर की प्रतीक्षा की हो।"
               data-en="Supporting an elder is not merely a donation; it is an act of gratitude, culture and humanity. Your contribution can bring food to an elder, care to a lonely heart, and the joy of a sacred journey to someone who may have waited for it all their life."></p>
          </div>

          <div class="initiative-blocks" style="margin-top:16px;">

            <div class="initiative-box">
              <h3 data-hi="💰 दान का प्रभाव" data-en="💰 Donation Impact"></h3>
              <p data-hi="आपका सहयोग वृद्धजनों के लिए आवश्यक सहायता, खाद्य सामग्री, दवाइयां, स्वच्छता किट, वस्त्र, जलपान, यात्रा सहयोग, स्वयंसेवक समन्वय और सम्मानजनक देखभाल उपलब्ध कराने में मदद कर सकता है। आपका दान वृद्धाश्रमों को दी जाने वाली मासिक सहायता में भी योगदान कर सकता है और संस्था को भविष्य में स्वयं वृद्धाश्रम स्थापित करने के लक्ष्य के और निकट ले जा सकता है।"
                 data-en="Your support can help provide essential assistance, food items, medicines, hygiene kits, clothing, refreshments, travel support, volunteer coordination and dignity-based care for elderly citizens. Your donation may also support monthly assistance to old age homes and help the organization move closer to its future goal of establishing its own old age homes."></p>
            </div>

            <div class="initiative-box">
              <h3 data-hi="🤝 निगरानी एवं जवाबदेही" data-en="🤝 Monitoring & Accountability"></h3>
              <p data-hi="यह कार्यक्रम संस्था के अध्यक्ष और अवलोकन समिति की निगरानी में संचालित किया जाता है। लाभार्थी विवरण, सहायता गतिविधियां, वृद्धाश्रम सहायता रिकॉर्ड, यात्रा योजना, खर्च और सेवा रिकॉर्ड व्यवस्थित रूप से सुरक्षित रखे जाते हैं। जहां संभव हो, दानदाताओं को वृद्धजनों के लिए आयोजित गतिविधियों, वृद्धाश्रमों को दी गई मासिक सहायता और उनके सहयोग से हुए प्रभाव की जानकारी साझा की जा सकती है।"
                 data-en="The programme is monitored by the President and the observing committee of the organization. Beneficiary details, support activities, old age home assistance records, tour planning, expenses and service records are maintained systematically. Wherever possible, donors may receive updates regarding activities conducted for elderly citizens, monthly support provided to old age homes and the impact created through their contribution."></p>
            </div>

          </div>

          <div class="initiative-box" style="margin-top:16px;">
            <h3 data-hi="🌱 दीर्घकालिक दृष्टि" data-en="🌱 Long-Term Vision"></h3>
            <p data-hi="कोई भी समाज तभी संवेदनशील माना जाता है जब वह अपने वृद्धजनों का सम्मान करता है। वृद्धजन सेवा दान नहीं, बल्कि हमारा कर्तव्य, संस्कृति और नैतिक जिम्मेदारी है। इस पहल के माध्यम से भारत अभ्युदय संस्थान ऐसा समुदाय बनाना चाहता है, जहां वृद्धजनों को देखभाल, साथ, सम्मान और भावनात्मक सुरक्षा मिल सके।"
               data-en="A society is truly compassionate when it respects its elders. Elder care is not charity; it is our duty, culture and moral responsibility. Through this initiative, Bharat Abhyudaya Sansthan aims to create a community where elderly citizens receive care, companionship, dignity and emotional security."></p>
          </div>

          <p class="initiative-note"
             data-hi="आपका छोटा सा सहयोग किसी वृद्धजन के लिए भोजन, सम्मान, अपनापन और आध्यात्मिक शांति का माध्यम बन सकता है।"
             data-en="Your small support can become a source of food, dignity, companionship and spiritual peace for an elderly citizen."></p>

          <h2 data-hi="युवा कौशल एवं स्वावलंबन — बेहतर भविष्य के लिए कौशल, आत्मविश्वास और दिशा"
              data-en="Youth Skills & Self-Reliance — Skills, confidence and direction for a better future"></h2>

  <script>
    (function(){
      function currentLang(){
        return localStorage.getItem('bas_lang') || 'hi';
      }

      function setButtonLabel(btn, isOpen){
        const lang = currentLang();
        const labels = {
          hi: { open: 'पूरा विवरण पढ़ें', close: 'विवरण बंद करें' },
          en: { open: 'Read More', close: 'Hide Details' }
        };
        btn.textContent = isOpen ? labels[lang].close : labels[lang].open;
      }

      function getButtonsForTarget(targetId){
        return document.querySelectorAll('.toggle-readmore[data-target="' + targetId + '"]');
      }

      function updateButtonsForTarget(targetId, isOpen){
        getButtonsForTarget(targetId).forEach((btn)=>{
          setButtonLabel(btn, isOpen);
        });
      }

      function closeOtherDetailSections(currentId){
        document.querySelectorAll('.detail-toggle-content').forEach((section)=>{
          if(section.id !== currentId){
            section.classList.remove('open');
            updateButtonsForTarget(section.id, false);
          }
        });
      }

      function toggleSection(targetId){
        const target = document.getElementById(targetId);
        if(!target) return;

        const wasOpen = target.classList.contains('open');

        closeOtherDetailSections(targetId);

        if(wasOpen){
          target.classList.remove('open');
          updateButtonsForTarget(targetId, false);
          return;
        }

        target.classList.add('open');
        updateButtonsForTarget(targetId, true);

        setTimeout(() => {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 120);
      }

      function initReadMoreToggles(){
        const buttons = document.querySelectorAll('.toggle-readmore');

        buttons.forEach((btn)=>{
          const targetId = btn.getAttribute('data-target');
          const target = document.getElementById(targetId);
          const isOpen = target && target.classList.contains('open');
          setButtonLabel(btn, isOpen);

          btn.addEventListener('click', function(){
            toggleSection(targetId);
          });
        });
      }

      function refreshToggleTexts(){
        document.querySelectorAll('.toggle-readmore').forEach((btn)=>{
          const targetId = btn.getAttribute('data-target');
          const target = document.getElementById(targetId);
          const isOpen = target && target.classList.contains('open');
          setButtonLabel(btn, isOpen);
        });
      }

      document.addEventListener('DOMContentLoaded', function(){
        initReadMoreToggles();
        refreshToggleTexts();

        const langToggle = document.getElementById('langToggle');
        if(langToggle){
          langToggle.addEventListener('click', function(){
            setTimeout(refreshToggleTexts, 80);
          });
        }
      });

      window.addEventListener('storage', refreshToggleTexts);
    })();
  </script>

  <script>
  (function(){
    <script>
  (function(){
    function initProgramImageLightbox(){
      const lightbox = document.getElementById('programImageLightbox');
      const lightboxInner = document.getElementById('programImageLightboxInner');
      const previewImg = document.getElementById('programImagePreview');
      const caption = document.getElementById('programImageCaption');
      const closeBtn = document.getElementById('programImageClose');

      const zoomInBtn = document.getElementById('zoomInBtn');
      const zoomOutBtn = document.getElementById('zoomOutBtn');
      const zoomResetBtn = document.getElementById('zoomResetBtn');

      if(!lightbox || !lightboxInner || !previewImg || !caption || !closeBtn) return;

      let zoomLevel = 1;
      let translateX = 0;
      let translateY = 0;
      let isDragging = false;
      let startX = 0;
      let startY = 0;

      const minZoom = 1;
      const maxZoom = 4;
      const zoomStep = 0.25;

      /* Grid images + Detailed section images */
      const allClickableImages = document.querySelectorAll(
        '.program-grid .program-card > img, .initiative-feature-media img'
      );

      function applyTransform(){
        previewImg.style.transform =
          'translate(' + translateX + 'px, ' + translateY + 'px) scale(' + zoomLevel + ')';
      }

      function resetZoom(){
        zoomLevel = 1;
        translateX = 0;
        translateY = 0;
        applyTransform();
      }

      function zoomIn(){
        zoomLevel = Math.min(maxZoom, zoomLevel + zoomStep);
        applyTransform();
      }

      function zoomOut(){
        zoomLevel = Math.max(minZoom, zoomLevel - zoomStep);

        if(zoomLevel === 1){
          translateX = 0;
          translateY = 0;
        }

        applyTransform();
      }

      function openLightbox(img){
        previewImg.src = img.getAttribute('src');
        previewImg.alt = img.getAttribute('alt') || 'Program image';
        caption.textContent = img.getAttribute('alt') || '';

        resetZoom();

        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.classList.add('lightbox-lock');
      }

      function closeLightbox(){
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('lightbox-lock');

        resetZoom();

        setTimeout(function(){
          if(!lightbox.classList.contains('open')){
            previewImg.src = '';
            previewImg.alt = '';
            caption.textContent = '';
          }
        }, 200);
      }

      allClickableImages.forEach(function(img){
        img.setAttribute('tabindex', '0');
        img.setAttribute('role', 'button');
        img.setAttribute('title', 'Click to view full image');

        img.addEventListener('click', function(){
          openLightbox(img);
        });

        img.addEventListener('keydown', function(e){
          if(e.key === 'Enter' || e.key === ' '){
            e.preventDefault();
            openLightbox(img);
          }
        });
      });

      if(zoomInBtn){
        zoomInBtn.addEventListener('click', function(e){
          e.stopPropagation();
          zoomIn();
        });
      }

      if(zoomOutBtn){
        zoomOutBtn.addEventListener('click', function(e){
          e.stopPropagation();
          zoomOut();
        });
      }

      if(zoomResetBtn){
        zoomResetBtn.addEventListener('click', function(e){
          e.stopPropagation();
          resetZoom();
        });
      }

      closeBtn.addEventListener('click', closeLightbox);

      lightbox.addEventListener('click', function(e){
        if(e.target === lightbox || e.target === lightboxInner){
          closeLightbox();
        }
      });

      previewImg.addEventListener('dblclick', function(e){
        e.stopPropagation();

        if(zoomLevel === 1){
          zoomLevel = 2;
        }else{
          resetZoom();
        }

        applyTransform();
      });

      previewImg.addEventListener('wheel', function(e){
        e.preventDefault();

        if(e.deltaY < 0){
          zoomIn();
        }else{
          zoomOut();
        }
      }, { passive: false });

      previewImg.addEventListener('mousedown', function(e){
        if(zoomLevel <= 1) return;

        isDragging = true;
        previewImg.classList.add('dragging');
        startX = e.clientX - translateX;
        startY = e.clientY - translateY;
      });

      document.addEventListener('mousemove', function(e){
        if(!isDragging) return;

        translateX = e.clientX - startX;
        translateY = e.clientY - startY;
        applyTransform();
      });

      document.addEventListener('mouseup', function(){
        isDragging = false;
        previewImg.classList.remove('dragging');
      });

      previewImg.addEventListener('touchstart', function(e){
        if(zoomLevel <= 1 || !e.touches.length) return;

        isDragging = true;
        startX = e.touches[0].clientX - translateX;
        startY = e.touches[0].clientY - translateY;
      }, { passive: true });

      previewImg.addEventListener('touchmove', function(e){
        if(!isDragging || !e.touches.length) return;

        translateX = e.touches[0].clientX - startX;
        translateY = e.touches[0].clientY - startY;
        applyTransform();
      }, { passive: true });

      previewImg.addEventListener('touchend', function(){
        isDragging = false;
      });

      document.addEventListener('keydown', function(e){
        if(!lightbox.classList.contains('open')) return;

        if(e.key === 'Escape'){
          closeLightbox();
        }

        if(e.key === '+'){
          zoomIn();
        }

        if(e.key === '-'){
          zoomOut();
        }

        if(e.key === '0'){
          resetZoom();
        }
      });
    }

    document.addEventListener('DOMContentLoaded', initProgramImageLightbox);
  })();
</script>
</body>
</html>
