  <style>
    .policy-hero{
      background: linear-gradient(135deg, rgba(11,90,166,.10), rgba(245,139,31,.10));
      padding: 80px 0 46px;
      border-bottom: 1px solid var(--border);
    }

    .policy-hero h1{
      margin: 0 0 14px;

      letter-spacing: -.03em;
      color: var(--fg);
    }

    .policy-hero p{
      margin: 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
    }

    .policy-card{
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 34px;
    }

    .policy-card h2{
      margin: 30px 0 12px;
      font-size: 1.28rem;
      line-height: 1.3;
      color: var(--fg);
    }

    .policy-card h2:first-child{
      margin-top: 0;
    }

    .policy-card p{
      margin: 0 0 14px;
      color: var(--muted);
      font-size: .98rem;
      line-height: 1.78;
    }

    .policy-card ul{
      margin: 0 0 18px;
      padding-left: 22px;
      color: var(--muted);
    }

    .policy-card li{
      margin-bottom: 8px;
      line-height: 1.65;
      font-size: .96rem;
    }

    .policy-note{
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      margin: 18px 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: .95rem;
    }

    .policy-contact-box{
      background: linear-gradient(135deg, rgba(11,90,166,.08), rgba(245,139,31,.08));
      border: 1px solid rgba(11,90,166,.12);
      border-radius: 18px;
      padding: 18px;
      margin-top: 16px;
    }

    .policy-contact-box strong{
      color: var(--fg);
    }

    .policy-contact-box a{
      color: var(--brand);
      font-weight: 700;
      text-decoration: none;
    }

    .policy-contact-box a:hover{
      text-decoration: underline;
    }

    .last-updated{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(11,90,166,.08);
      color: var(--brand);
      border: 1px solid rgba(11,90,166,.12);
      padding: 8px 13px;
      border-radius: 999px;
      font-size: .88rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    @media (max-width: 700px){

        padding: 62px 0 36px;

        padding: 22px;
        border-radius: 18px;
      }

      .policy-card h2{
        font-size: 1.15rem;
      }

<body>

  <section class="policy-hero">
    <div class="wrap">
      <span class="kicker" data-hi="गोपनीयता नीति" data-en="Privacy Policy"></span>

      <h1 data-hi="Privacy Policy" data-en="Privacy Policy"></h1>

      <p data-hi="भारत अभ्युदय संस्थान आपकी व्यक्तिगत जानकारी, दान संबंधी विवरण और संपर्क जानकारी की गोपनीयता का सम्मान करता है। यह नीति बताती है कि हम आपकी जानकारी कैसे एकत्र, उपयोग और सुरक्षित करते हैं।"
         data-en="Bharat Abhyudaya Sansthan respects the privacy of your personal information, donation-related details and contact information. This policy explains how we collect, use and protect your information."></p>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <div class="policy-card">

        <div class="last-updated" data-hi="अंतिम अपडेट: 09 मई 2026" data-en="Last Updated: 09 May 2026"></div>

        <h2 data-hi="1. संस्था के बारे में" data-en="1. About the Organization"></h2>
        <p data-hi="भारत अभ्युदय संस्थान एक जनसेवी संस्था है, जो शिक्षा, स्वास्थ्य सेवा, महिला सशक्तिकरण, वृद्धजन सहायता, गौसेवा, धरोहर संरक्षण और अन्य सामाजिक क्षेत्रों में कार्य करती है।"
           data-en="Bharat Abhyudaya Sansthan is a social service organization working in the areas of education, healthcare, women empowerment, elder care, cow care, heritage conservation and other community welfare initiatives."></p>

        <h2 data-hi="2. हम कौन-सी जानकारी एकत्र कर सकते हैं" data-en="2. Information We May Collect"></h2>
        <p data-hi="जब आप हमारी वेबसाइट, संपर्क फॉर्म, दान फॉर्म, सोशल मीडिया विज्ञापन, Meta Lead Form, Google Form, WhatsApp या email के माध्यम से हमसे संपर्क करते हैं, तो हम निम्न जानकारी एकत्र कर सकते हैं:"
           data-en="When you contact us through our website, contact form, donation form, social media advertisement, Meta Lead Form, Google Form, WhatsApp or email, we may collect the following information:"></p>

        <ul>
          <li data-hi="नाम" data-en="Name"></li>
          <li data-hi="मोबाइल नंबर / WhatsApp नंबर" data-en="Mobile number / WhatsApp number"></li>
          <li data-hi="Email address" data-en="Email address"></li>
          <li data-hi="शहर, राज्य या देश" data-en="City, state or country"></li>
          <li data-hi="दान या सहयोग से जुड़ी प्राथमिकताएँ" data-en="Donation or support preferences"></li>
          <li data-hi="दान की राशि, payment reference, transaction details या receipt संबंधी जानकारी" data-en="Donation amount, payment reference, transaction details or receipt-related information"></li>
          <li data-hi="आपके द्वारा स्वेच्छा से साझा की गई कोई अन्य जानकारी" data-en="Any other information voluntarily shared by you"></li>
        </ul>

        <h2 data-hi="3. जानकारी का उपयोग कैसे किया जाता है" data-en="3. How We Use the Information"></h2>
        <p data-hi="हम आपकी जानकारी का उपयोग निम्न उद्देश्यों के लिए कर सकते हैं:"
           data-en="We may use your information for the following purposes:"></p>

        <ul>
          <li data-hi="आपसे दान, सहयोग, स्वयंसेवा या कार्यक्रम संबंधी संवाद करने के लिए" data-en="To communicate with you regarding donations, support, volunteering or programme-related information"></li>
          <li data-hi="Shiksha Sarathi और अन्य सामाजिक अभियानों की जानकारी साझा करने के लिए" data-en="To share information about Shiksha Sarathi and other social initiatives"></li>
          <li data-hi="Donation receipt, acknowledgement या 80G से संबंधित आवश्यक communication के लिए" data-en="To send donation receipts, acknowledgements or communication related to 80G where applicable"></li>
          <li data-hi="Donor follow-up, impact updates और reports साझा करने के लिए" data-en="To share donor follow-ups, impact updates and reports"></li>
          <li data-hi="Website, ad campaign और communication process को बेहतर बनाने के लिए" data-en="To improve our website, ad campaigns and communication process"></li>
          <li data-hi="कानूनी, लेखा, audit या compliance requirements के लिए" data-en="For legal, accounting, audit or compliance requirements"></li>
        </ul>

        <h2 data-hi="4. Donation और Payment Information" data-en="4. Donation and Payment Information"></h2>
        <p data-hi="Online donations के लिए हम Razorpay या अन्य authorized payment gateway का उपयोग कर सकते हैं। Payment processing के दौरान आपकी financial information संबंधित payment gateway द्वारा उसकी अपनी security और privacy policy के अनुसार process की जाती है।"
           data-en="For online donations, we may use Razorpay or other authorized payment gateways. During payment processing, your financial information is processed by the relevant payment gateway according to its own security and privacy policy."></p>

        <p data-hi="हम आपकी card, UPI PIN, net banking password या sensitive payment credentials store नहीं करते हैं।"
           data-en="We do not store your card details, UPI PIN, net banking password or sensitive payment credentials."></p>

        <h2 data-hi="5. Lead Forms और Social Media Ads" data-en="5. Lead Forms and Social Media Ads"></h2>
        <p data-hi="यदि आप Facebook, Instagram, Meta Lead Form, Google Form या किसी अन्य advertisement form के माध्यम से अपनी जानकारी साझा करते हैं, तो हम उस जानकारी का उपयोग केवल संस्था के कार्यक्रम, donation options, follow-up communication और donor support purposes के लिए करेंगे।"
           data-en="If you share your information through Facebook, Instagram, Meta Lead Form, Google Form or any other advertisement form, we will use that information only for programme information, donation options, follow-up communication and donor support purposes."></p>

        <div class="policy-note" data-hi="हम किसी donor या interested supporter की जानकारी को बिना उचित कारण किसी third party को बेचते, किराए पर देते या commercial misuse के लिए साझा नहीं करते।"
             data-en="We do not sell, rent or share donor or interested supporter information with third parties for commercial misuse."></div>

        <h2 data-hi="6. WhatsApp, Email और Phone Communication" data-en="6. WhatsApp, Email and Phone Communication"></h2>
        <p data-hi="आपके द्वारा दी गई contact information के आधार पर संस्था आपको WhatsApp, phone call, SMS या email के माध्यम से programme details, donation follow-up, receipt, impact update या अन्य relevant information भेज सकती है।"
           data-en="Based on the contact information provided by you, the organization may contact you through WhatsApp, phone call, SMS or email for programme details, donation follow-up, receipt, impact update or other relevant information."></p>

        <p data-hi="यदि आप भविष्य में communication प्राप्त नहीं करना चाहते हैं, तो आप हमें message या email करके opt-out/unsubscribe request भेज सकते हैं।"
           data-en="If you do not wish to receive future communication, you may send us an opt-out/unsubscribe request by message or email."></p>

        <h2 data-hi="7. Cookies और Website Usage" data-en="7. Cookies and Website Usage"></h2>
        <p data-hi="हमारी website basic analytics, performance improvement या ad campaign tracking के लिए cookies या similar technologies का उपयोग कर सकती है। इससे हमें यह समझने में मदद मिलती है कि visitors हमारी website का उपयोग कैसे कर रहे हैं।"
           data-en="Our website may use cookies or similar technologies for basic analytics, performance improvement or ad campaign tracking. This helps us understand how visitors use our website."></p>

        <p data-hi="यदि हम Meta Pixel, Google Analytics या similar tools का उपयोग करते हैं, तो उनका उद्देश्य केवल website performance, campaign measurement और retargeting improvement होगा।"
           data-en="If we use Meta Pixel, Google Analytics or similar tools, their purpose will be limited to website performance, campaign measurement and retargeting improvement."></p>

        <h2 data-hi="8. Data Sharing" data-en="8. Data Sharing"></h2>
        <p data-hi="हम आपकी जानकारी केवल निम्न परिस्थितियों में साझा कर सकते हैं:"
           data-en="We may share your information only in the following situations:"></p>

        <ul>
          <li data-hi="Donation receipt, accounting, audit या compliance purposes के लिए authorized professionals/service providers के साथ" data-en="With authorized professionals/service providers for donation receipt, accounting, audit or compliance purposes"></li>
          <li data-hi="Payment processing के लिए payment gateway या banking partners के साथ" data-en="With payment gateways or banking partners for payment processing"></li>
          <li data-hi="कानून, सरकारी आदेश, audit या legal compliance की आवश्यकता होने पर" data-en="When required by law, government order, audit or legal compliance"></li>
          <li data-hi="आपकी अनुमति से किसी specific purpose के लिए" data-en="For a specific purpose with your consent"></li>
        </ul>

        <h2 data-hi="9. Data Security" data-en="9. Data Security"></h2>
        <p data-hi="हम आपकी जानकारी को unauthorized access, misuse, loss या alteration से बचाने के लिए reasonable administrative, technical और organizational measures अपनाते हैं।"
           data-en="We take reasonable administrative, technical and organizational measures to protect your information from unauthorized access, misuse, loss or alteration."></p>

        <p data-hi="फिर भी, internet-based communication पूरी तरह risk-free नहीं हो सकती। इसलिए हम आपसे अनुरोध करते हैं कि sensitive financial credentials जैसे OTP, PIN, password आदि किसी के साथ साझा न करें।"
           data-en="However, internet-based communication cannot be completely risk-free. Therefore, we request you not to share sensitive financial credentials such as OTP, PIN or passwords with anyone."></p>

        <h2 data-hi="10. Data Retention" data-en="10. Data Retention"></h2>
        <p data-hi="हम donor records, communication records, receipts और compliance-related information को उस अवधि तक रख सकते हैं जितनी administrative, accounting, audit, legal या reporting purposes के लिए आवश्यक हो।"
           data-en="We may retain donor records, communication records, receipts and compliance-related information for as long as required for administrative, accounting, audit, legal or reporting purposes."></p>

        <h2 data-hi="11. आपके अधिकार" data-en="11. Your Rights"></h2>
        <p data-hi="आप हमसे अपनी personal information के संबंध में निम्न request कर सकते हैं:"
           data-en="You may contact us regarding your personal information for the following requests:"></p>

        <ul>
          <li data-hi="अपनी जानकारी देखने या confirm करने की request" data-en="Request to view or confirm your information"></li>
          <li data-hi="गलत जानकारी correction करने की request" data-en="Request correction of inaccurate information"></li>
          <li data-hi="Communication बंद करने की request" data-en="Request to stop communication"></li>
          <li data-hi="जहाँ applicable हो, जानकारी हटाने की request" data-en="Request deletion of information where applicable"></li>
        </ul>

        <h2 data-hi="12. Children’s Privacy" data-en="12. Children’s Privacy"></h2>
        <p data-hi="हमारी website और donation forms सामान्य donors, volunteers और supporters के लिए हैं। हम जानबूझकर बच्चों से personal information collect नहीं करते, जब तक कि यह किसी programme documentation, beneficiary support या parent/guardian/community consent के appropriate context में न हो।"
           data-en="Our website and donation forms are intended for general donors, volunteers and supporters. We do not knowingly collect personal information from children unless it is in an appropriate context of programme documentation, beneficiary support or with parent/guardian/community consent."></p>

        <h2 data-hi="13. Third-Party Links" data-en="13. Third-Party Links"></h2>
        <p data-hi="हमारी website में Razorpay, WhatsApp, Facebook, Instagram, LinkedIn, Google Forms या अन्य third-party websites के links हो सकते हैं। ऐसी external websites की privacy practices उनके अपने terms और privacy policies के अनुसार governed होंगी।"
           data-en="Our website may contain links to Razorpay, WhatsApp, Facebook, Instagram, LinkedIn, Google Forms or other third-party websites. The privacy practices of such external websites are governed by their own terms and privacy policies."></p>

        <h2 data-hi="14. Policy Updates" data-en="14. Policy Updates"></h2>
        <p data-hi="हम समय-समय पर इस Privacy Policy को update कर सकते हैं। Updated policy इसी page पर publish की जाएगी और “Last Updated” date बदल दी जाएगी।"
           data-en="We may update this Privacy Policy from time to time. The updated policy will be published on this page and the “Last Updated” date will be revised."></p>

        <h2 data-hi="15. Contact Us" data-en="15. Contact Us"></h2>
        <p data-hi="यदि आपको इस Privacy Policy, donor information, data correction या communication opt-out के संबंध में कोई प्रश्न है, तो आप हमसे संपर्क कर सकते हैं:"
           data-en="If you have any questions regarding this Privacy Policy, donor information, data correction or communication opt-out, you may contact us:"></p>

        <div class="policy-contact-box">
          <p>
            <strong>Bharat Abhyudaya Sansthan</strong><br>

            WhatsApp/Phone: <a href="https://wa.me/918604669454" target="_blank" rel="noopener">+91 86046 69454</a>
          </p>
        </div>

      </div>
