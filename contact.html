<!doctype html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | Bharat Abhyudaya Sansthan</title>
  <meta name="description" content="Contact Bharat Abhyudaya Sansthan for support, volunteering, donations, partnerships or programme coordination.">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="header"></div>
  <div class="topbar-space"></div>

  <section class="hero">
    <div class="wrap">
      <span class="kicker" data-hi="संपर्क" data-en="Contact"></span>
      <h1 data-hi="सहयोग, स्वयंसेवा, साझेदारी या सहायता — हमसे जुड़िए।" data-en="For support, volunteering, partnership or assistance — get in touch."></h1>
      <p data-hi="यदि आप संस्था के किसी कार्यक्रम से जुड़ना चाहते हैं, किसी जरूरतमंद मामले की सूचना साझा करना चाहते हैं, या दान/साझेदारी पर चर्चा करना चाहते हैं, तो हमसे संपर्क कर सकते हैं।" data-en="Whether you want to engage with a programme, share a verified case in need, or discuss donations and partnerships, you can reach out to us here."></p>
    </div>
  </section>

  <section class="section">
    <div class="wrap contact-grid">
      <div class="card contact-card">
        <h2 data-hi="कार्यालय एवं संपर्क विवरण" data-en="Office & Contact Details"></h2>
        <div class="kv-grid">
          <div class="kv"><b data-hi="स्थान" data-en="Location"></b><span data-hi="फतेहपुर, उत्तर प्रदेश" data-en="Fatehpur, Uttar Pradesh"></span></div>
          <div class="kv"><b data-hi="मोबाइल" data-en="Phone"></b><span>8604669454</span></div>
          <div class="kv"><b data-hi="ईमेल" data-en="Email"></b><span>sheopratapsingh243@gmail.com</span></div>
          <div class="kv"><b data-hi="उद्देश्य" data-en="Purpose"></b><span data-hi="सामाजिक सेवा एवं जनसहयोग" data-en="Social service & community support"></span></div>
        </div>
        <div class="notice" style="margin-top:18px" data-hi="Google Maps के इस block को आप अपने वास्तविक pinned location link से बाद में और अधिक सटीक बना सकते हैं।" data-en="You can later make this Google Maps block more precise by replacing it with your exact pinned location link."></div>
        <iframe title="Fatehpur Map" src="https://www.google.com/maps?q=Fatehpur%20Uttar%20Pradesh&output=embed" loading="lazy"></iframe>
      </div>

      <div class="card">
        <h2 data-hi="त्वरित संदेश भेजें" data-en="Send a quick message"></h2>
        <p class="section-sub" style="font-size:16px" data-hi="यह फॉर्म WhatsApp message draft खोलता है, ताकि technical backend के बिना भी website visitor तुरंत संपर्क कर सके।" data-en="This form opens a WhatsApp message draft so that visitors can contact you instantly even without a technical backend."></p>
        <form id="contactForm" class="form-grid" style="margin-top:18px">
          <input id="nameField" class="input" required data-hi-placeholder="आपका नाम" data-en-placeholder="Your name" placeholder="आपका नाम">
          <input id="phoneField" class="input" required data-hi-placeholder="मोबाइल नंबर" data-en-placeholder="Phone number" placeholder="मोबाइल नंबर">
          <textarea id="messageField" required data-hi-placeholder="अपना संदेश लिखें" data-en-placeholder="Write your message" placeholder="अपना संदेश लिखें"></textarea>
          <button class="btn btn-primary" type="submit" data-hi="WhatsApp पर भेजें" data-en="Send via WhatsApp"></button>
        </form>
        <div class="impact-band" data-hi="सुझाव: भविष्य में आप Netlify Forms, Formspree या Google Forms integration जोड़कर इस form को email/database based form में भी बदल सकते हैं।" data-en="Suggestion: In the future, you can turn this into an email/database-based form by integrating Netlify Forms, Formspree or Google Forms."></div>
      </div>
    </div>
  </section>

  <a class="whatsapp-float" href="https://wa.me/918604669454" target="_blank">WhatsApp</a>
  <a class="donate-float" href="donate.html" data-hi="दान करें" data-en="Donate"></a>
  <div id="footer"></div>
  <script src="assets/js/main.js"></script>
</body>
</html>
